<!DOCTYPE html>
<html lang="uk">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Дашборд проєкту — Проєктна платформа ЦППР</title>
<script src="https://accounts.google.com/gsi/client" async defer></script>
<style>
  :root {
    --ink: #1a1d29; --ink-soft: #5a6072; --ink-faint: #9097a8;
    --line: #e4e7ef; --line-soft: #eef0f6; --bg: #f7f8fb; --card: #ffffff;
    --brand: #252868; --brand-soft: #eeedfe; --accent: #1c75bc;
    --danger: #c0392b; --danger-bg: #fdf0ee;
    --warn: #b9770e; --warn-bg: #fdf6e9;
    --ok: #1d7a54; --ok-bg: #e9f5ef;
    --radius: 12px; --radius-sm: 8px;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: -apple-system, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
    background: var(--bg); color: var(--ink); line-height: 1.5; -webkit-font-smoothing: antialiased;
  }
  .wrap { max-width: 920px; margin: 0 auto; padding: 20px 20px 64px; }
  .gate { min-height: 100vh; display: flex; align-items: center; justify-content: center; background: linear-gradient(135deg, #1C75BC, #252868); padding: 20px; }
  .gate-card { background: #fff; border-radius: 16px; padding: 40px 36px; max-width: 380px; text-align: center; box-shadow: 0 20px 60px rgba(0,0,0,0.25); }
  .gate-card .mark { font-size: 32px; margin-bottom: 10px; }
  .gate-card h1 { font-size: 20px; color: var(--brand); margin-bottom: 6px; }
  .gate-card p { font-size: 13px; color: var(--ink-soft); margin-bottom: 18px; }
  .gate-card .err { color: var(--danger); font-size: 12.5px; margin-top: 14px; }
  .gate-card button.logout { font: inherit; font-size: 13px; margin-top: 18px; padding: 8px 18px; border: 1px solid var(--line); border-radius: 8px; background: #fff; cursor: pointer; color: var(--ink-soft); }
  .signin-slot { display: flex; justify-content: center; }

  .appbar { display: flex; align-items: center; justify-content: space-between; max-width: 920px; margin: 0 auto; padding: 14px 20px 0; }
  .appbar a.back { font-size: 13px; color: var(--accent); text-decoration: none; }
  .appbar a.back:hover { text-decoration: underline; }
  .appbar .me { font-size: 13px; color: var(--ink-soft); display: flex; align-items: center; gap: 10px; }
  .appbar .me button { font: inherit; font-size: 12px; padding: 4px 11px; border: 1px solid var(--line); border-radius: 7px; background: #fff; cursor: pointer; color: var(--ink-soft); }

  /* проєкт-хедер */
  header.proj { margin-bottom: 20px; }
  header.proj h1 { font-size: 21px; font-weight: 600; letter-spacing: -0.01em; line-height: 1.25; }
  header.proj .meta { color: var(--ink-soft); font-size: 13.5px; margin-top: 6px; display: flex; gap: 14px; flex-wrap: wrap; }
  header.proj .meta b { color: var(--ink); font-weight: 600; }
  .badge { display: inline-block; padding: 2px 9px; border-radius: 999px; font-size: 11.5px; font-weight: 600; }
  .badge.active { background: var(--ok-bg); color: var(--ok); }
  .badge.draft { background: var(--line-soft); color: var(--ink-soft); }
  .badge.closed { background: var(--danger-bg); color: var(--danger); }

  /* картки стану */
  .counts { display: grid; grid-template-columns: repeat(4, 1fr); gap: 12px; margin-bottom: 22px; }
  .count { background: var(--card); border: 1px solid var(--line); border-radius: var(--radius); padding: 15px; }
  .count .n { font-size: 25px; font-weight: 600; letter-spacing: -0.02em; }
  .count .l { font-size: 12.5px; color: var(--ink-soft); margin-top: 2px; }
  .count.danger .n { color: var(--danger); } .count.warn .n { color: var(--warn); } .count.ok .n { color: var(--ok); }

  /* тривога несвіжості */
  .stale-alert { background: var(--warn-bg); border: 1px solid #f0d9a8; border-radius: var(--radius); padding: 12px 16px; margin-bottom: 22px; font-size: 13.5px; color: var(--warn); display: flex; align-items: center; gap: 10px; }
  .stale-alert.clean { background: var(--ok-bg); border-color: #bfe3d0; color: var(--ok); }

  /* дедлайни звітів — дві стрічки */
  .rep-cols { display: grid; grid-template-columns: 1fr 1fr; gap: 14px; margin-bottom: 26px; }
  @media (max-width: 680px) { .rep-cols { grid-template-columns: 1fr; } .counts { grid-template-columns: 1fr 1fr; } }
  .rep-col h3 { font-size: 12px; font-weight: 700; text-transform: uppercase; letter-spacing: 0.04em; color: var(--ink-faint); margin-bottom: 8px; display: flex; align-items: center; gap: 6px; }
  .rep-list { background: var(--card); border: 1px solid var(--line); border-radius: var(--radius); overflow: hidden; }
  .rep-row { padding: 10px 13px; border-top: 1px solid var(--line-soft); font-size: 13px; display: flex; justify-content: space-between; gap: 10px; }
  .rep-row:first-child { border-top: none; }
  .rep-row .lbl { min-width: 0; }
  .rep-row .lbl .t { line-height: 1.3; }
  .rep-row .when { white-space: nowrap; text-align: right; flex-shrink: 0; font-size: 12px; }
  .rep-row.overdue { background: var(--danger-bg); } .rep-row.overdue .when { color: var(--danger); font-weight: 600; }
  .rep-row.soon .when { color: var(--warn); font-weight: 600; }
  .rep-row.done .lbl .t { color: var(--ink-faint); text-decoration: line-through; }
  .rep-row.done .when { color: var(--ok); }
  .rep-row .rep-act { flex-shrink: 0; display: flex; align-items: center; }
  .rep-toggle { font: inherit; font-size: 11px; padding: 3px 9px; border: 1px solid var(--line); border-radius: 6px; background: #fff; color: var(--ok); cursor: pointer; white-space: nowrap; }
  .rep-toggle:hover { background: var(--ok-bg); border-color: var(--ok); }
  .rep-toggle:disabled { opacity: .5; cursor: default; }
  .rep-gen { padding: 8px 13px; border-top: 1px solid var(--line-soft); }
  .gen-dates { font: inherit; font-size: 11.5px; padding: 5px 11px; border: 1px dashed var(--line); border-radius: 7px; background: #fff; color: var(--accent); cursor: pointer; width: 100%; }
  .gen-dates:hover { background: var(--brand-soft); border-color: var(--accent); }
  .gen-dates:disabled { opacity: .5; cursor: default; }
  /* видалення задач/замірів */
  .task .del-task { font: inherit; font-size: 12px; line-height: 1; padding: 2px 5px; border: 1px solid transparent; border-radius: 5px; background: none; color: var(--ink-faint); cursor: pointer; flex-shrink: 0; }
  .task .del-task:hover { background: var(--danger-bg); color: var(--danger); border-color: var(--line); }
  .del-meas { font: inherit; font-size: 11px; line-height: 1; padding: 2px 5px; border: 1px solid transparent; border-radius: 5px; background: none; color: var(--ink-faint); cursor: pointer; }
  .del-meas:hover { background: var(--danger-bg); color: var(--danger); border-color: var(--line); }
  /* залежності у формі задачі */
  .tf-deps-wrap { margin-bottom: 10px; padding: 8px 10px; background: #fff; border: 1px solid var(--line); border-radius: 6px; }
  .tf-deps-cap { font-size: 11.5px; color: var(--ink-soft); margin-bottom: 6px; }
  .tf-dep { display: flex; align-items: flex-start; gap: 7px; font-size: 12.5px; color: var(--ink); padding: 3px 0; cursor: pointer; }
  .tf-dep input { width: auto; margin-top: 2px; }
  /* період звіту: дії + форма */
  .rep-act { gap: 4px !important; }
  .rep-edit, .rep-del { font: inherit; font-size: 12px; line-height: 1; padding: 3px 6px; border: 1px solid var(--line); border-radius: 6px; background: #fff; cursor: pointer; color: var(--ink-soft); }
  .rep-edit:hover { background: var(--brand-soft); color: var(--brand); border-color: var(--accent); }
  .rep-del:hover { background: var(--danger-bg); color: var(--danger); border-color: var(--danger); }
  .rep-add { font: inherit; font-size: 11.5px; padding: 5px 11px; border: 1px dashed var(--line); border-radius: 7px; background: #fff; color: var(--accent); cursor: pointer; margin-top: 6px; width: 100%; }
  .rep-add:hover { background: var(--brand-soft); border-color: var(--accent); }
  .rep-form { padding: 10px 13px; border-top: 1px solid var(--line-soft); background: var(--bg); }
  .rep-form .rf-row { display: flex; gap: 8px; flex-wrap: wrap; margin-bottom: 8px; }
  .rep-form input { font: inherit; font-size: 12.5px; padding: 6px 9px; border: 1px solid var(--line); border-radius: 6px; background: #fff; }
  .rep-form .rf-label { flex: 1; min-width: 160px; } .rep-form .rf-due { width: 150px; }
  .rep-form .rf-actions { display: flex; gap: 8px; }
  .rep-form .rep-save { font: inherit; font-size: 12.5px; padding: 6px 14px; border: none; border-radius: 6px; background: var(--accent); color: #fff; cursor: pointer; }
  .rep-form .rep-save:disabled { opacity: .5; cursor: default; }
  .rep-form .rep-cancel { font: inherit; font-size: 12.5px; padding: 6px 12px; border: 1px solid var(--line); border-radius: 6px; background: #fff; color: var(--ink-soft); cursor: pointer; }

  /* секція */
  .section-title { font-size: 13px; font-weight: 700; text-transform: uppercase; letter-spacing: 0.04em; color: var(--ink-faint); margin: 0 2px 12px; }

  /* Logframe-дерево */
  .tree { background: var(--card); border: 1px solid var(--line); border-radius: var(--radius); padding: 6px 0; }
  .node { border-top: 1px solid var(--line-soft); }
  .node:first-child { border-top: none; }
  .node-head { display: flex; align-items: flex-start; gap: 9px; padding: 10px 16px; cursor: pointer; }
  .node-head:hover { background: var(--bg); }
  .node-head .tw { width: 16px; flex-shrink: 0; color: var(--ink-faint); font-size: 11px; text-align: center; padding-top: 3px; }
  .node-head .code { flex-shrink: 0; font-variant-numeric: tabular-nums; font-weight: 600; font-size: 12.5px; color: var(--ink-soft); min-width: 34px; padding-top: 1px; }
  .node-head .ttl { flex: 1; min-width: 0; font-size: 14px; }
  .node-head .lvl { flex-shrink: 0; font-size: 10px; font-weight: 700; text-transform: uppercase; letter-spacing: 0.03em; padding: 2px 7px; border-radius: 5px; margin-top: 1px; }
  .lvl.impact { background: var(--brand-soft); color: var(--brand); }
  .lvl.outcome { background: #e7f0fb; color: var(--accent); }
  .lvl.output { background: var(--ok-bg); color: var(--ok); }
  .lvl.activity { background: var(--warn-bg); color: var(--warn); }
  .node-children { padding-left: 22px; }
  .node.cond > .node-head .ttl { color: var(--ink-soft); }
  .cond-tag { font-size: 10.5px; color: var(--warn); border: 1px solid #f0d9a8; border-radius: 5px; padding: 1px 5px; margin-left: 6px; white-space: nowrap; }
  .act-dates { font-size: 11.5px; color: var(--ink-faint); margin-left: 6px; white-space: nowrap; }
  .act-overdue { color: var(--danger); font-weight: 600; }

  /* індикатори всередині вузла */
  .ind-block { padding: 4px 16px 12px 60px; }
  .ind { padding: 8px 0; border-top: 1px dashed var(--line); }
  .ind:first-child { border-top: none; }
  .ind .ihead { display: flex; justify-content: space-between; gap: 12px; align-items: baseline; }
  .ind .iname { font-size: 13px; color: var(--ink); flex: 1; }
  .ind .ivals { font-size: 12px; color: var(--ink-soft); white-space: nowrap; font-variant-numeric: tabular-nums; }
  .bar { height: 7px; background: var(--line-soft); border-radius: 4px; margin-top: 6px; overflow: hidden; }
  .bar > span { display: block; height: 100%; border-radius: 4px; }
  .bar.green > span { background: var(--ok); } .bar.blue > span { background: var(--accent); } .bar.red > span { background: var(--danger); }
  .ifoot { display: flex; justify-content: space-between; align-items: center; gap: 12px; margin-top: 5px; font-size: 11px; color: var(--ink-faint); }
  .ifoot-right { display: flex; gap: 12px; align-items: center; flex-shrink: 0; }
  .pct-done { color: var(--ok); font-weight: 600; }
  .fresh-dot { display: inline-block; }
  .fresh-stale { color: var(--warn); font-weight: 600; }

  /* задачі під активністю */
  .task-block { padding: 2px 16px 12px 60px; }
  .task { display: flex; align-items: center; gap: 9px; padding: 6px 0; font-size: 13px; border-top: 1px dashed var(--line); }
  .task:first-child { border-top: none; }
  .task .box { width: 15px; height: 15px; border-radius: 4px; border: 1.5px solid var(--line); flex-shrink: 0; }
  .task.done .box { background: var(--ok); border-color: var(--ok); }
  .task.done .tt { color: var(--ink-faint); text-decoration: line-through; }
  .task .tt { flex: 1; min-width: 0; }
  .task .td { font-size: 11.5px; color: var(--ink-faint); white-space: nowrap; }
  .task.overdue .td { color: var(--danger); font-weight: 600; }
  .task .who { font-size: 11px; color: var(--ink-faint); white-space: nowrap; }
  .stale-node { opacity: 0.55; }

  .state { padding: 40px 16px; text-align: center; color: var(--ink-soft); font-size: 14px; }
  .state.err { color: var(--danger); }
  .hidden { display: none !important; }

  /* інтерактив: задачі */
  .task .box.editable { cursor: pointer; transition: border-color .12s, background .12s; }
  .task .box.editable:hover { border-color: var(--ok); background: var(--ok-bg); }
  .task.done .box.editable:hover { background: var(--line-soft); }

  /* інтерактив: заміри */
  .add-meas { font: inherit; font-size: 11px; padding: 2px 9px; border: 1px solid var(--line); border-radius: 6px; background: #fff; color: var(--accent); cursor: pointer; white-space: nowrap; }
  .add-meas:hover { background: var(--brand-soft); border-color: var(--accent); }

  /* інтерактив: задачі (редагування/додавання) */
  .task .edit-task { font: inherit; font-size: 13px; line-height: 1; padding: 2px 6px; border: 1px solid transparent; border-radius: 5px; background: none; color: var(--ink-faint); cursor: pointer; flex-shrink: 0; }
  .task .edit-task:hover { background: var(--brand-soft); color: var(--brand); border-color: var(--line); }
  .manual-tag { font-size: 10px; color: var(--accent); background: #e7f0fb; border-radius: 4px; padding: 1px 5px; margin-left: 4px; }
  .task-empty { font-size: 12.5px; color: var(--ink-faint); padding: 4px 0 8px; }
  .add-task { font: inherit; font-size: 12px; padding: 4px 12px; border: 1px dashed var(--line); border-radius: 7px; background: #fff; color: var(--accent); cursor: pointer; margin-top: 4px; }
  .add-task:hover { background: var(--brand-soft); border-color: var(--accent); }
  .task-form { margin: 8px 0 4px; padding: 12px; background: var(--bg); border: 1px solid var(--line); border-radius: var(--radius-sm); }
  .task-form .tf-row { display: flex; gap: 8px; flex-wrap: wrap; margin-bottom: 8px; }
  .task-form input, .task-form select { font: inherit; font-size: 12.5px; padding: 6px 9px; border: 1px solid var(--line); border-radius: 6px; background: #fff; }
  .task-form .tf-title { flex: 1; min-width: 180px; } .task-form .tf-due { width: 150px; }
  .task-form .tf-owner, .task-form .tf-parts { flex: 1; min-width: 160px; }
  .task-form .tf-vis { flex: 1; min-width: 200px; } .task-form .tf-deps { flex: 1; min-width: 160px; }
  .task-form .tf-cond { display: flex; align-items: center; gap: 7px; font-size: 12.5px; color: var(--ink-soft); margin-bottom: 10px; cursor: pointer; }
  .task-form .tf-cond-box { width: auto; }
  .task-form .tf-actions { display: flex; gap: 8px; }
  .task-form .tf-save { font: inherit; font-size: 12.5px; padding: 6px 14px; border: none; border-radius: 6px; background: var(--accent); color: #fff; cursor: pointer; }
  .task-form .tf-save:disabled { opacity: .5; cursor: default; }
  .task-form .tf-cancel { font: inherit; font-size: 12.5px; padding: 6px 12px; border: 1px solid var(--line); border-radius: 6px; background: #fff; color: var(--ink-soft); cursor: pointer; }

  .meas-form { margin-top: 8px; padding: 10px; background: var(--bg); border: 1px solid var(--line); border-radius: var(--radius-sm); }
  .meas-form .mf-row { display: flex; gap: 8px; flex-wrap: wrap; }
  .meas-form input { font: inherit; font-size: 12.5px; padding: 6px 9px; border: 1px solid var(--line); border-radius: 6px; background: #fff; }
  .meas-form .m-period { width: 110px; } .meas-form .m-value { width: 130px; } .meas-form .m-comment { flex: 1; min-width: 140px; }
  .meas-form .mf-actions { margin-top: 8px; display: flex; gap: 8px; }
  .meas-form .m-save { font: inherit; font-size: 12.5px; padding: 6px 14px; border: none; border-radius: 6px; background: var(--accent); color: #fff; cursor: pointer; }
  .meas-form .m-save:disabled { opacity: .5; cursor: default; }
  .meas-form .m-cancel { font: inherit; font-size: 12.5px; padding: 6px 12px; border: 1px solid var(--line); border-radius: 6px; background: #fff; color: var(--ink-soft); cursor: pointer; }

  /* тост */
  .toast { position: fixed; bottom: 24px; left: 50%; transform: translateX(-50%) translateY(20px); opacity: 0; pointer-events: none; background: var(--ink); color: #fff; font-size: 13.5px; padding: 11px 20px; border-radius: 10px; box-shadow: 0 8px 30px rgba(0,0,0,0.25); transition: opacity .2s, transform .2s; z-index: 999; }
  .toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }
  .toast.ok { background: var(--ok); } .toast.err { background: var(--danger); }

  .switcher { margin-bottom: 16px; }
  .switcher select { font: inherit; font-size: 13px; padding: 7px 10px; border: 1px solid var(--line); border-radius: 8px; background: #fff; max-width: 100%; }
</style>
</head>
<body>

<div class="gate" id="screenLogin">
  <div class="gate-card">
    <div class="mark">📋</div>
    <h1>Дашборд проєкту</h1>
    <p>Увійдіть через Google-акаунт ЦППР.</p>
    <div class="signin-slot" id="gsiButton"></div>
    <div class="err" id="loginErr"></div>
  </div>
</div>

<div class="gate hidden" id="screenLoading">
  <div class="gate-card"><div class="mark">⏳</div><p style="margin:0">Завантаження…</p></div>
</div>

<div class="gate hidden" id="screenDenied">
  <div class="gate-card">
    <div class="mark">🚫</div>
    <h1 style="color:var(--danger)">Доступу немає</h1>
    <p id="deniedMsg">До цього проєкту немає доступу.</p>
    <button class="logout" onclick="logout()">Вийти</button>
  </div>
</div>

<div class="hidden" id="screenApp">
  <div class="appbar">
    <a class="back" href="index.html">← Мій понеділок</a>
    <div class="me"><span id="meEmail">—</span><button onclick="logout()">Вийти</button></div>
  </div>
  <div class="wrap">
    <div class="switcher hidden" id="switcher">
      <select id="projSelect" onchange="onProjChange()"></select>
    </div>

    <header class="proj">
      <h1 id="pName">—</h1>
      <div class="meta" id="pMeta"></div>
    </header>

    <div class="counts" id="counts"></div>
    <div id="staleAlert"></div>

    <div class="section-title">Дедлайни звітування</div>
    <div class="rep-cols">
      <div class="rep-col">
        <h3><span class="badge" style="background:var(--brand-soft);color:var(--brand)">фінансові</span></h3>
        <div class="rep-list" id="repFin"></div>
      </div>
      <div class="rep-col">
        <h3><span class="badge" style="background:var(--ok-bg);color:var(--ok)">змістовні</span></h3>
        <div class="rep-list" id="repNarr"></div>
      </div>
    </div>

    <div class="section-title">Logframe</div>
    <div class="tree" id="tree"><div class="state">—</div></div>
  </div>
</div>

<script>
// ════════════════════════════════════════════════════════
const BACKEND_URL = "https://script.google.com/macros/s/AKfycbzwJLuPeHYiu7oJGZIr-d6vTe4NB22it9Cs4nSzW1Xjf4KTDkf7bbAp7X7oEIDhUeJQ/exec";
const GOOGLE_CLIENT_ID = "480913215993-h8o3gcsismg88cjg7h7e48h9o8gpj45r.apps.googleusercontent.com";
const STALE_DAYS = 30;
const PROJECT_START = new Date(2026, 0, 1); // запасний старт для конвертації місяців→дат, якщо в проєкті немає start_date
// ════════════════════════════════════════════════════════

var authToken = null;
var currentProjectId = null;
var expanded = {}; // code -> bool (відкриті вузли)
var _lastData = null;
var myEmail = null;    // надійний email беремо з токена; права — на бекенді
var myRole = null;     // role з getProject (lead/member/finance) — лише для показу контролів

// ── auth (як у index.html) ──
function initGoogle() {
  if (!(window.google && window.google.accounts && window.google.accounts.id)) { setTimeout(initGoogle, 200); return; }
  window.google.accounts.id.initialize({ client_id: GOOGLE_CLIENT_ID, callback: onCredential });
  window.google.accounts.id.renderButton(document.getElementById("gsiButton"),
    { theme: "filled_blue", size: "large", text: "signin_with", locale: "uk", width: 280 });
}
function decodeJwt(token) {
  try {
    var base = token.split(".")[1].replace(/-/g, "+").replace(/_/g, "/");
    var json = decodeURIComponent(atob(base).split("").map(function (c) {
      return "%" + ("00" + c.charCodeAt(0).toString(16)).slice(-2);
    }).join(""));
    return JSON.parse(json);
  } catch (e) { return null; }
}
function onCredential(resp) {
  var info = decodeJwt(resp.credential);
  if (!info || !info.email) { showLoginErr("Не вдалося отримати email."); return; }
  authToken = resp.credential;
  myEmail = String(info.email).toLowerCase().trim();
  localStorage.setItem("cplr_pp_token", authToken);
  document.getElementById("meEmail").textContent = info.email;
  boot();
}
function showLoginErr(m) { document.getElementById("loginErr").textContent = m; }
function logout() {
  authToken = null; localStorage.removeItem("cplr_pp_token");
  if (window.google && window.google.accounts && window.google.accounts.id) window.google.accounts.id.disableAutoSelect();
  show("screenLogin");
}
function show(id) {
  ["screenLogin","screenLoading","screenDenied","screenApp"].forEach(function (s) {
    document.getElementById(s).classList.toggle("hidden", s !== id);
  });
}

// ── завантаження ──
function qparam(name) {
  var m = new RegExp("[?&]" + name + "=([^&]*)").exec(window.location.search);
  return m ? decodeURIComponent(m[1]) : null;
}

function boot() {
  show("screenLoading");
  currentProjectId = qparam("project");
  // спершу список проєктів (для перемикача й щоб знати, куди йти, якщо project не задано)
  fetch(BACKEND_URL + "?action=getProjects&authToken=" + encodeURIComponent(authToken))
    .then(function (r) { return r.json(); })
    .then(function (data) {
      if (data.error === "AUTH_REQUIRED") { logout(); showLoginErr("Сесія застаріла, увійдіть знову."); return; }
      var projects = data.projects || [];
      if (!projects.length) { document.getElementById("deniedMsg").textContent = "Цей акаунт не має доступу до жодного проєкту."; show("screenDenied"); return; }
      buildSwitcher(projects);
      if (!currentProjectId) currentProjectId = String(projects[0].id);
      loadProject(currentProjectId);
    })
    .catch(function (e) { show("screenLogin"); showLoginErr("Бекенд недоступний. " + e); });
}

function buildSwitcher(projects) {
  if (projects.length <= 1) return;
  var sel = document.getElementById("projSelect");
  sel.innerHTML = projects.map(function (p) {
    return '<option value="' + esc(p.id) + '">' + esc(p.name) + '</option>';
  }).join("");
  document.getElementById("switcher").classList.remove("hidden");
}
function onProjChange() {
  currentProjectId = document.getElementById("projSelect").value;
  history.replaceState(null, "", "?project=" + encodeURIComponent(currentProjectId));
  show("screenLoading");
  loadProject(currentProjectId);
}

function loadProject(pid) {
  fetch(BACKEND_URL + "?action=getProject&projectId=" + encodeURIComponent(pid) + "&authToken=" + encodeURIComponent(authToken))
    .then(function (r) { return r.json(); })
    .then(function (data) {
      if (data.error === "AUTH_REQUIRED") { logout(); return; }
      if (data.error === "ACCESS_DENIED") { show("screenDenied"); return; }
      if (data.error) { show("screenApp"); document.getElementById("tree").innerHTML = '<div class="state err">Помилка: ' + esc(data.error) + '</div>'; return; }
      var sel = document.getElementById("projSelect");
      if (sel) sel.value = String(pid);
      renderProject(data);
      show("screenApp");
    })
    .catch(function (e) { show("screenApp"); document.getElementById("tree").innerHTML = '<div class="state err">' + esc(String(e)) + '</div>'; });
}

// ── запис (POST, стиль системи заходів: text/plain, тіло JSON) ──
function apiPost(action, payload) {
  var body = JSON.stringify(Object.assign({ action: action, authToken: authToken }, payload || {}));
  return fetch(BACKEND_URL, { method: "POST", redirect: "follow", headers: { "Content-Type": "text/plain" }, body: body })
    .then(function (r) { return r.text(); })
    .then(function (t) { try { return JSON.parse(t); } catch (e) { return { error: "BAD_RESPONSE", raw: t }; } });
}

// невеликий тост
function toast(msg, kind) {
  var el = document.getElementById("toast");
  if (!el) { el = document.createElement("div"); el.id = "toast"; document.body.appendChild(el); }
  el.textContent = msg;
  el.className = "toast show" + (kind ? " " + kind : "");
  clearTimeout(el._t);
  el._t = setTimeout(function () { el.className = "toast"; }, 3000);
}

// перезавантажити поточний проєкт після запису (оновити прогрес/свіжість/статуси)
function reloadCurrent() { loadProject(currentProjectId); }

// ── утиліти ──
function esc(s) { return String(s == null ? "" : s).replace(/[&<>"]/g, function (c) { return { "&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;" }[c]; }); }
function daysUntil(dateStr) {
  if (!dateStr) return null;
  var d = new Date(dateStr); if (isNaN(d)) return null;
  var t = new Date(); t.setHours(0,0,0,0);
  return Math.round((d - t) / 86400000);
}
function daysSince(dateStr) {
  if (!dateStr) return null;
  var d = new Date(dateStr); if (isNaN(d)) return null;
  var t = new Date(); t.setHours(0,0,0,0);
  return Math.round((t - d) / 86400000);
}
function isTrue(v) { return String(v).toUpperCase() === "TRUE"; }
function fmtDate(s) {
  if (!s) return "—";
  var d = new Date(s); if (isNaN(d)) return esc(s);
  return d.toLocaleDateString("uk-UA", { day: "2-digit", month: "2-digit", year: "numeric" });
}
// місяць N проєкту → приблизна дата кінця цього місяця (для overdue активностей без точних дат)
function monthToDate(startDate, monthN) {
  var base = startDate ? new Date(startDate) : PROJECT_START;
  if (isNaN(base)) base = PROJECT_START;
  var d = new Date(base.getFullYear(), base.getMonth() + (monthN - 1) + 1, 0); // кінець місяця
  return d;
}

// ── головний рендер ──
function renderProject(d) {
  _lastData = d;
  myRole = d.role || "member";
  var p = d.project || {};
  document.getElementById("pName").textContent = p.name || "Проєкт";
  var statusCls = (p.status === "active") ? "active" : (p.status === "closed") ? "closed" : "draft";
  var statusLbl = (p.status === "active") ? "активний" : (p.status === "closed") ? "закритий" : "чернетка";
  document.getElementById("pMeta").innerHTML =
    '<span class="badge ' + statusCls + '">' + statusLbl + '</span>' +
    '<span>Донор: <b>' + esc(p.donor || "—") + '</b></span>' +
    (p.budget_total ? '<span>Бюджет: <b>' + esc(Number(p.budget_total).toLocaleString("uk-UA")) + ' ' + esc(p.currency || "") + '</b></span>' : '') +
    '<span>' + fmtDate(p.start_date) + ' — ' + fmtDate(p.end_date) + (p.months ? ' (' + esc(p.months) + ' міс.)' : '') + '</span>';

  var logframe = d.logframe || [];
  var indicators = d.indicators || [];
  var measurements = d.measurements || [];
  var tasks = d.tasks || [];
  var reports = d.reportingPeriods || [];

  // індекс замірів за indicator_id (останній за ts = поточне значення)
  var measByInd = {};
  measurements.forEach(function (m) {
    var k = String(m.indicator_id);
    if (!measByInd[k]) measByInd[k] = [];
    measByInd[k].push(m);
  });
  Object.keys(measByInd).forEach(function (k) {
    measByInd[k].sort(function (a, b) { return new Date(a.ts) - new Date(b.ts); });
  });

  // індикатори за parent_id (вузол логфрейму)
  var indByParent = {};
  indicators.forEach(function (i) {
    var k = String(i.parent_id);
    if (!indByParent[k]) indByParent[k] = [];
    indByParent[k].push(i);
  });

  // задачі за activity_id
  var tasksByAct = {};
  tasks.forEach(function (t) {
    var k = String(t.activity_id);
    if (!tasksByAct[k]) tasksByAct[k] = [];
    tasksByAct[k].push(t);
  });

  // ── картки стану ──
  var today = new Date(); today.setHours(0,0,0,0);
  var openTasks = tasks.filter(function (t) { return String(t.status).toLowerCase() !== "done"; });
  var overdueTasks = openTasks.filter(function (t) {
    if (isTrue(t.conditional)) return false;
    var du = daysUntil(t.due_date); return du !== null && du < 0;
  });
  var openReports = reports.filter(function (r) { return String(r.status).toLowerCase() !== "submitted"; });
  var overdueReports = openReports.filter(function (r) { var du = daysUntil(r.due_date); return du !== null && du < 0; });

  // свіжість: індикатори, чий останній замір старший за STALE_DAYS (або взагалі без замірів)
  var staleInds = indicators.filter(function (i) {
    var ms = measByInd[String(i.id)];
    if (!ms || !ms.length) return true;
    var ds = daysSince(ms[ms.length - 1].ts);
    return ds !== null && ds > STALE_DAYS;
  });

  document.getElementById("counts").innerHTML =
    card(overdueTasks.length, "Прострочені задачі", overdueTasks.length ? "danger" : "ok") +
    card(openTasks.length, "Відкриті задачі", "") +
    card(overdueReports.length, "Прострочені звіти", overdueReports.length ? "danger" : "ok") +
    card(indicators.length, "Індикаторів", "");

  // ── тривога несвіжості ──
  var sa = document.getElementById("staleAlert");
  if (staleInds.length) {
    sa.innerHTML = '<div class="stale-alert">⏳ <span><b>' + staleInds.length + '</b> ' +
      plural(staleInds.length, "індикатор не оновлювався", "індикатори не оновлювались", "індикаторів не оновлювались") +
      ' понад ' + STALE_DAYS + ' днів. Дані ризикують застаріти.</span></div>';
  } else {
    sa.innerHTML = '<div class="stale-alert clean">✓ Усі індикатори оновлені впродовж останніх ' + STALE_DAYS + ' днів.</div>';
  }

  // ── дедлайни звітів (дві колонки) ──
  var isLeadView = myRole === "lead";
  renderReports("repFin", reports.filter(function (r) { return r.kind === "financial"; }), "financial", isLeadView, p.id);
  renderReports("repNarr", reports.filter(function (r) { return r.kind === "narrative"; }), "narrative", isLeadView, p.id);

  // ── Logframe-дерево ──
  // будуємо мапу parent_id -> [діти], сортуємо за display_order
  var byParent = {};
  logframe.forEach(function (n) {
    var k = n.parent_id ? String(n.parent_id) : "__root__";
    if (!byParent[k]) byParent[k] = [];
    byParent[k].push(n);
  });
  Object.keys(byParent).forEach(function (k) {
    byParent[k].sort(function (a, b) { return (Number(a.display_order) || 0) - (Number(b.display_order) || 0); });
  });

  var ctx = { byParent: byParent, indByParent: indByParent, tasksByAct: tasksByAct, measByInd: measByInd, project: p,
              myEmail: myEmail, myRole: myRole };
  var roots = byParent["__root__"] || [];
  var html = roots.map(function (n) { return renderNode(n, ctx, 0); }).join("");
  document.getElementById("tree").innerHTML = html || '<div class="empty state">Logframe порожній.</div>';
  bindTree();
  bindReports();
}

function card(n, label, cls) {
  return '<div class="count ' + cls + '"><div class="n">' + n + '</div><div class="l">' + label + '</div></div>';
}
function plural(n, one, few, many) {
  var m10 = n % 10, m100 = n % 100;
  if (m10 === 1 && m100 !== 11) return one;
  if (m10 >= 2 && m10 <= 4 && (m100 < 10 || m100 >= 20)) return few;
  return many;
}

function renderReports(elId, list, kind, isLead, projectId) {
  var el = document.getElementById(elId);
  list.sort(function (a, b) { return new Date(a.due_date) - new Date(b.due_date); });

  var rowsHtml = list.length ? list.map(function (r) {
    var done = String(r.status).toLowerCase() === "submitted";
    var du = daysUntil(r.due_date);
    var cls = done ? "done" : (du !== null && du < 0) ? "overdue" : (du !== null && du <= 14) ? "soon" : "";
    var when = done ? "подано " + fmtDate(r.submitted_date)
      : du === null ? "—"
      : du < 0 ? "прострочено " + Math.abs(du) + " дн."
      : du === 0 ? "сьогодні"
      : "за " + du + " дн.";
    var acts = isLead
      ? '<div class="rep-act">' +
          '<button class="rep-toggle" data-period="' + esc(r.id) + '" data-submitted="' + (done ? "0" : "1") + '" title="' + (done ? "Повернути в очікування" : "Позначити поданим") + '">' + (done ? "↩" : "✓ подано") + '</button>' +
          '<button class="rep-edit" data-period="' + esc(r.id) + '" title="Редагувати дату/назву">✎</button>' +
          '<button class="rep-del" data-period="' + esc(r.id) + '" data-label="' + esc(r.period_label) + '" title="Видалити період">🗑</button>' +
        '</div>'
      : '';
    return '<div class="rep-row ' + cls + '">' +
        '<div class="lbl"><div class="t">' + esc(r.period_label) + '</div></div>' +
        '<div class="when">' + when + '<br><span style="color:var(--ink-faint)">' + fmtDate(r.due_date) + '</span></div>' +
        acts +
      '</div>' +
      (isLead ? '<div class="rep-form hidden" data-rform="' + esc(r.id) + '"></div>' : '');
  }).join("") : '<div class="rep-row"><div class="lbl"><div class="t" style="color:var(--ink-faint)">Немає періодів.</div></div></div>';

  // кнопки координатора: догенерувати дати + додати один період вручну
  var genBtn = isLead
    ? '<div class="rep-gen">' +
        '<button class="gen-dates" data-kind="' + esc(kind) + '" data-project="' + esc(projectId) + '">' +
          (list.length ? "Догенерувати дати з періодичності" : "Сформувати дати з періодичності") + '</button>' +
        '<button class="rep-add" data-kind="' + esc(kind) + '" data-project="' + esc(projectId) + '">+ один період вручну</button>' +
        '<div class="rep-form hidden" data-rform="new:' + esc(kind) + '"></div>' +
      '</div>'
    : '';

  el.innerHTML = rowsHtml + genBtn;
}

function renderNode(n, ctx, depth) {
  var id = String(n.id);
  var code = String(n.code);
  var lvl = String(n.level);
  var children = ctx.byParent[id] || [];
  var inds = ctx.indByParent[id] || [];
  var acts = (lvl === "activity") ? (ctx.tasksByAct[id] || []) : [];
  var hasKids = children.length || inds.length || acts.length || lvl === "activity";
  var isCond = isTrue(n.conditional);
  var open = expanded[code] !== undefined ? expanded[code] : (lvl === "impact" || lvl === "outcome");

  // overdue для активності: якщо end_month/end_date минув, не done, не умовна
  var actExtra = "";
  if (lvl === "activity") {
    var rng = "";
    if (n.start_month && n.end_month) rng = "міс. " + esc(n.start_month) + "–" + esc(n.end_month);
    if (n.start_date || n.end_date) rng = fmtDate(n.start_date) + " – " + fmtDate(n.end_date);
    var endRef = n.end_date ? new Date(n.end_date) : (n.end_month ? monthToDate(ctx.project.start_date, Number(n.end_month)) : null);
    var ovd = !isCond && endRef && !isNaN(endRef) && endRef < new Date() && String(n.status).toLowerCase() !== "done";
    if (rng) actExtra = '<span class="act-dates' + (ovd ? ' act-overdue' : '') + '">' + rng + (ovd ? ' · прострочено' : '') + '</span>';
  }

  var head =
    '<div class="node-head" data-code="' + esc(code) + '">' +
      '<span class="tw">' + (hasKids ? (open ? '▾' : '▸') : '') + '</span>' +
      '<span class="code">' + esc(code) + '</span>' +
      '<span class="ttl">' + esc(n.title) + actExtra +
        (isCond ? '<span class="cond-tag">умовна</span>' : '') + '</span>' +
      '<span class="lvl ' + lvl + '">' + lvlLabel(lvl) + '</span>' +
    '</div>';

  var inner = "";
  if (open) {
    if (inds.length) inner += renderIndicators(inds, ctx);
    if (lvl === "activity") inner += renderTasks(acts, ctx, n);
    if (children.length) inner += '<div class="node-children">' + children.map(function (c) { return renderNode(c, ctx, depth + 1); }).join("") + '</div>';
  }

  return '<div class="node' + (isCond ? ' cond' : '') + '">' + head + inner + '</div>';
}

function lvlLabel(l) { return { impact: "impact", outcome: "outcome", output: "output", activity: "activity" }[l] || l; }

function renderIndicators(inds, ctx) {
  var rows = inds.map(function (i) {
    var ms = ctx.measByInd[String(i.id)] || [];
    var current = ms.length ? Number(ms[ms.length - 1].value) : (i.baseline != null ? Number(i.baseline) : 0);
    var target = Number(i.target) || 0;
    var pct = target > 0 ? Math.round((current / target) * 100) : 0;
    var reached = pct >= 100;
    var pctShown = reached ? "ціль досягнута" + (pct > 100 ? " (" + pct + "%)" : "") : pct + "%";
    var barCls = reached ? "green" : pct >= 80 ? "green" : pct >= 50 ? "blue" : "red";
    var lastTs = ms.length ? ms[ms.length - 1].ts : null;
    var ds = daysSince(lastTs);
    var stale = (ds === null) || ds > STALE_DAYS;
    var freshTxt = (lastTs == null) ? "немає замірів"
      : ds === 0 ? "оновлено сьогодні"
      : "оновлено " + ds + " " + plural(ds, "день тому", "дні тому", "днів тому");
    // право вносити замір (для показу): owner індикатора АБО lead. Захист — на бекенді.
    var canMeasure = ctx.myRole === "lead" ||
                     String(i.owner_email || "").toLowerCase().trim() === ctx.myEmail;
    var lastMeasId = ms.length ? ms[ms.length - 1].id : null;
    return '<div class="ind' + (stale ? ' stale-node' : '') + '">' +
        '<div class="ihead"><span class="iname">' + esc(i.name) + '</span>' +
        '<span class="ivals">' + esc(current) + ' / ' + esc(target) + ' ' + esc(i.unit || "") +
          (i.target_year ? ' · ' + esc(i.target_year) : '') + '</span></div>' +
        '<div class="bar ' + barCls + '"><span style="width:' + Math.min(100, Math.max(2, pct)) + '%"></span></div>' +
        '<div class="ifoot"><span' + (reached ? ' class="pct-done"' : '') + '>' + pctShown + '</span>' +
          '<span class="ifoot-right">' +
            '<span class="' + (stale ? 'fresh-stale' : '') + '">' + (stale ? '⏳ ' : '') + freshTxt + '</span>' +
            (canMeasure && lastMeasId ? '<button class="del-meas" data-meas="' + esc(lastMeasId) + '" title="Видалити останній замір">🗑</button>' : '') +
            (canMeasure ? '<button class="add-meas" data-ind="' + esc(i.id) + '" data-unit="' + esc(i.unit || "") + '">+ замір</button>' : '') +
          '</span>' +
        '</div>' +
        '<div class="meas-form hidden" data-form="' + esc(i.id) + '"></div>' +
      '</div>';
  }).join("");
  return '<div class="ind-block">' + rows + '</div>';
}

function renderTasks(tasks, ctx, actNode) {
  tasks.sort(function (a, b) { return new Date(a.due_date) - new Date(b.due_date); });
  var rows = tasks.map(function (t) {
    var done = String(t.status).toLowerCase() === "done";
    var du = daysUntil(t.due_date);
    var ovd = !done && !isTrue(t.conditional) && du !== null && du < 0;
    var who = String(t.owner_email || "").split("@")[0];
    var ts = daysSince(t.ts);
    var stale = !done && ts !== null && ts > STALE_DAYS;
    // право міняти статус (для показу): учасник АБО owner АБО lead. Реальна перевірка — на бекенді.
    var amParticipant = emailInList(ctx.myEmail, t.participants) ||
                        String(t.owner_email || "").toLowerCase().trim() === ctx.myEmail;
    var canEdit = ctx.myRole === "lead" || amParticipant;
    var canDelete = ctx.myRole === "lead" || amParticipant ||
                    String(t.created_by || "").toLowerCase().trim() === ctx.myEmail;
    var nextStatus = done ? "pending" : "done";
    return '<div class="task ' + (done ? 'done' : '') + (ovd ? ' overdue' : '') + (stale ? ' stale-node' : '') + '">' +
        '<span class="box' + (canEdit ? ' editable' : '') + '"' +
          (canEdit ? ' data-task="' + esc(t.id) + '" data-next="' + nextStatus + '" title="' + (done ? 'Відкрити задачу' : 'Позначити виконаною') + '"' : ' title="лише учасники можуть змінювати"') +
        '></span>' +
        '<span class="tt">' + esc(t.title) + (isTrue(t.manual_add) ? ' <span class="manual-tag">додано</span>' : '') +
          (isTrue(t.conditional) ? ' <span class="manual-tag" style="background:var(--warn-bg);color:var(--warn)" title="Виконується лише за потреби; не червоніє як прострочена">за потреби</span>' : '') + '</span>' +
        '<span class="who">' + esc(who) + '</span>' +
        '<span class="td">' + (ovd ? "прострочено " + Math.abs(du) + " дн." : fmtDate(t.due_date)) + '</span>' +
        (canEdit ? '<button class="edit-task" data-task="' + esc(t.id) + '" title="Редагувати">✎</button>' : '<span style="width:14px"></span>') +
        (canDelete ? '<button class="del-task" data-task="' + esc(t.id) + '" data-title="' + esc(t.title) + '" title="Видалити">🗑</button>' : '<span style="width:14px"></span>') +
      '</div>' +
      '<div class="task-form hidden" data-form="task:' + esc(t.id) + '"></div>';
  }).join("");

  // право додати задачу: lead будь-куди, member — у своєму проєкті (manual_add). Захист на бекенді.
  var canAdd = ctx.myRole === "lead" || ctx.myRole === "member" || ctx.myRole === "finance";
  var addBtn = canAdd
    ? '<button class="add-task" data-act="' + esc(actNode.id) + '">+ задача</button>' +
      '<div class="task-form hidden" data-form="new:' + esc(actNode.id) + '"></div>'
    : '';

  return '<div class="task-block">' + (rows || '<div class="task-empty">Немає задач під цією активністю.</div>') + addBtn + '</div>';
}

// допоміжне для UI (дзеркало бекенду; справжній захист — на сервері)
function emailInList(email, listStr) {
  email = String(email || "").toLowerCase().trim();
  if (!email) return false;
  return String(listStr || "").toLowerCase().split(/[;,]/).map(function (s) { return s.trim(); }).filter(Boolean).indexOf(email) >= 0;
}

// делегований обробник на дереві — чіпляється ОДИН раз (treeBound),
// бо дерево перемальовується при згортанні й після запису.
var treeBound = false;
function bindTree() {
  if (treeBound) return;
  treeBound = true;
  var tree = document.getElementById("tree");

  tree.addEventListener("click", function (ev) {
    var t = ev.target;

    // 1) згорнути/розгорнути вузол
    var head = t.closest(".node-head");
    if (head && !t.closest(".task") && !t.closest(".ind")) {
      var code = head.getAttribute("data-code");
      var tw = head.querySelector(".tw").textContent.trim();
      if (!tw) return;
      expanded[code] = (tw === '▸');
      if (_lastData) renderProject(_lastData);
      return;
    }

    // 2) перемкнути статус задачі
    var box = t.closest(".box.editable");
    if (box) {
      var taskId = box.getAttribute("data-task");
      var next = box.getAttribute("data-next");
      box.style.opacity = "0.4";
      apiPost("setTaskStatus", { taskId: taskId, status: next }).then(function (res) {
        if (res && res.ok) { toast(next === "done" ? "Задачу закрито" : "Задачу відкрито", "ok"); reloadCurrent(); }
        else { toast(errMsg(res), "err"); box.style.opacity = ""; }
      });
      return;
    }

    // 3) відкрити/сховати форму заміру
    var addBtn = t.closest(".add-meas");
    if (addBtn) {
      var indId = addBtn.getAttribute("data-ind");
      var unit = addBtn.getAttribute("data-unit");
      var form = tree.querySelector('.meas-form[data-form="' + cssEsc(indId) + '"]');
      if (!form) return;
      if (!form.classList.contains("hidden")) { form.classList.add("hidden"); form.innerHTML = ""; return; }
      form.innerHTML = measFormHtml(indId, unit);
      form.classList.remove("hidden");
      var vi = form.querySelector(".m-value"); if (vi) vi.focus();
      return;
    }

    // 4) кнопки всередині форми заміру
    var save = t.closest(".m-save");
    if (save) { submitMeasurement(save.getAttribute("data-ind")); return; }
    var cancel = t.closest(".m-cancel");
    if (cancel) {
      var f = tree.querySelector('.meas-form[data-form="' + cssEsc(cancel.getAttribute("data-ind")) + '"]');
      if (f) { f.classList.add("hidden"); f.innerHTML = ""; }
      return;
    }

    // 5) додати задачу під активність
    var addTaskBtn = t.closest(".add-task");
    if (addTaskBtn) {
      var actId = addTaskBtn.getAttribute("data-act");
      var nf = tree.querySelector('.task-form[data-form="new:' + cssEsc(actId) + '"]');
      if (!nf) return;
      if (!nf.classList.contains("hidden")) { nf.classList.add("hidden"); nf.innerHTML = ""; return; }
      nf.innerHTML = taskFormHtml({ mode: "new", actId: actId });
      nf.classList.remove("hidden");
      var ti = nf.querySelector(".tf-title"); if (ti) ti.focus();
      return;
    }

    // 6) редагувати наявну задачу
    var editTaskBtn = t.closest(".edit-task");
    if (editTaskBtn) {
      var etId = editTaskBtn.getAttribute("data-task");
      var ef = tree.querySelector('.task-form[data-form="task:' + cssEsc(etId) + '"]');
      if (!ef) return;
      if (!ef.classList.contains("hidden")) { ef.classList.add("hidden"); ef.innerHTML = ""; return; }
      var task = (_lastData.tasks || []).filter(function (x) { return String(x.id) === etId; })[0];
      ef.innerHTML = taskFormHtml({ mode: "edit", task: task });
      ef.classList.remove("hidden");
      return;
    }

    // 7) зберегти / скасувати форму задачі
    var tsave = t.closest(".tf-save");
    if (tsave) { submitTask(tsave.getAttribute("data-mode"), tsave.getAttribute("data-key")); return; }
    var tcancel = t.closest(".tf-cancel");
    if (tcancel) {
      var tf = tree.querySelector('.task-form[data-form="' + cssEsc(tcancel.getAttribute("data-key")) + '"]');
      if (tf) { tf.classList.add("hidden"); tf.innerHTML = ""; }
      return;
    }

    // 8) видалити задачу
    var delTaskBtn = t.closest(".del-task");
    if (delTaskBtn) {
      var dtId = delTaskBtn.getAttribute("data-task");
      var dtTitle = delTaskBtn.getAttribute("data-title") || dtId;
      if (!confirm('Видалити задачу «' + dtTitle + '»?\nЦю дію не можна скасувати.')) return;
      delTaskBtn.disabled = true;
      apiPost("deleteTask", { taskId: dtId }).then(function (res) {
        if (res && res.ok) { toast("Задачу видалено", "ok"); reloadCurrent(); }
        else { toast(errMsg(res), "err"); delTaskBtn.disabled = false; }
      });
      return;
    }

    // 9) видалити останній замір індикатора
    var delMeasBtn = t.closest(".del-meas");
    if (delMeasBtn) {
      var dmId = delMeasBtn.getAttribute("data-meas");
      if (!confirm('Видалити останній замір цього індикатора?\nЦю дію не можна скасувати.')) return;
      delMeasBtn.disabled = true;
      apiPost("deleteMeasurement", { measurementId: dmId }).then(function (res) {
        if (res && res.ok) { toast("Замір видалено", "ok"); reloadCurrent(); }
        else { toast(errMsg(res), "err"); delMeasBtn.disabled = false; }
      });
      return;
    }
  });
}

var reportsBound = false;
function bindReports() {
  if (reportsBound) return;
  reportsBound = true;
  ["repFin", "repNarr"].forEach(function (cid) {
    var cont = document.getElementById(cid);
    if (!cont) return;
    cont.addEventListener("click", function (ev) {
      var t = ev.target;
      // позначити поданим / повернути
      var tog = t.closest(".rep-toggle");
      if (tog) {
        var periodId = tog.getAttribute("data-period");
        var submitted = tog.getAttribute("data-submitted") === "1";
        tog.disabled = true;
        apiPost("setReportSubmitted", { periodId: periodId, submitted: submitted }).then(function (res) {
          if (res && res.ok) { toast(submitted ? "Звіт позначено поданим" : "Звіт повернено в очікування", "ok"); reloadCurrent(); }
          else { toast(errMsg(res), "err"); tog.disabled = false; }
        });
        return;
      }
      // згенерувати дати
      var gen = t.closest(".gen-dates");
      if (gen) {
        var kind = gen.getAttribute("data-kind");
        var projectId = gen.getAttribute("data-project");
        var kindLbl = kind === "financial" ? "фінансових" : "змістовних";
        if (!confirm("Сформувати чернетку " + kindLbl + " дедлайнів з періодичності проєкту?\n\nНаявні неподані дати цього типу будуть замінені. Подані звіти не чіпаються. Дати потім можна підправити вручну.")) return;
        gen.disabled = true; gen.textContent = "…";
        apiPost("generateReportDates", { projectId: projectId, kind: kind, replace: true }).then(function (res) {
          if (res && res.ok) { toast("Сформовано дат: " + res.generated, "ok"); reloadCurrent(); }
          else { toast(errMsg(res), "err"); gen.disabled = false; }
        });
        return;
      }
      // редагувати період (дата/назва)
      var redit = t.closest(".rep-edit");
      if (redit) {
        var pid = redit.getAttribute("data-period");
        var rf = cont.querySelector('.rep-form[data-rform="' + cssEsc(pid) + '"]');
        if (!rf) return;
        if (!rf.classList.contains("hidden")) { rf.classList.add("hidden"); rf.innerHTML = ""; return; }
        var period = (_lastData.reportingPeriods || []).filter(function (x) { return String(x.id) === pid; })[0] || {};
        rf.innerHTML = repFormHtml({ mode: "edit", period: period });
        rf.classList.remove("hidden");
        return;
      }
      // видалити період
      var rdel = t.closest(".rep-del");
      if (rdel) {
        var dpid = rdel.getAttribute("data-period");
        var dlabel = rdel.getAttribute("data-label") || dpid;
        if (!confirm('Видалити період звіту «' + dlabel + '»?\nЦю дію не можна скасувати.')) return;
        rdel.disabled = true;
        apiPost("deleteReportingPeriod", { periodId: dpid }).then(function (res) {
          if (res && res.ok) { toast("Період видалено", "ok"); reloadCurrent(); }
          else { toast(errMsg(res), "err"); rdel.disabled = false; }
        });
        return;
      }
      // додати один період вручну
      var radd = t.closest(".rep-add");
      if (radd) {
        var akind = radd.getAttribute("data-kind");
        var aproj = radd.getAttribute("data-project");
        var nf = cont.querySelector('.rep-form[data-rform="new:' + cssEsc(akind) + '"]');
        if (!nf) return;
        if (!nf.classList.contains("hidden")) { nf.classList.add("hidden"); nf.innerHTML = ""; return; }
        nf.innerHTML = repFormHtml({ mode: "new", kind: akind, projectId: aproj });
        nf.classList.remove("hidden");
        return;
      }
      // зберегти / скасувати форму періоду
      var rsave = t.closest(".rep-save");
      if (rsave) { submitReportPeriod(rsave.getAttribute("data-key")); return; }
      var rcancel = t.closest(".rep-cancel");
      if (rcancel) {
        var cf = cont.querySelector('.rep-form[data-rform="' + cssEsc(rcancel.getAttribute("data-key")) + '"]');
        if (cf) { cf.classList.add("hidden"); cf.innerHTML = ""; }
        return;
      }
    });
  });
}

// форма періоду звіту (нова/редагування)
function repFormHtml(opts) {
  var p = opts.mode === "edit" ? (opts.period || {}) : {};
  var key = opts.mode === "edit" ? p.id : ("new:" + opts.kind);
  var due = p.due_date ? String(p.due_date).slice(0, 10) : "";
  return '<div class="rf-row">' +
      '<input class="rf-label" type="text" value="' + esc(p.period_label || "") + '" placeholder="назва періоду (напр. Фінансовий — лип 2026)">' +
      '<input class="rf-due" type="date" value="' + esc(due) + '">' +
    '</div>' +
    '<div class="rf-actions">' +
      '<button class="rep-save" data-key="' + esc(key) + '"' +
        (opts.mode === "new" ? ' data-new="1" data-kind="' + esc(opts.kind) + '" data-project="' + esc(opts.projectId) + '"' : ' data-period="' + esc(p.id) + '"') + '>' +
        (opts.mode === "new" ? "Додати" : "Зберегти") + '</button>' +
      '<button class="rep-cancel" data-key="' + esc(key) + '">Скасувати</button>' +
    '</div>';
}

function submitReportPeriod(key) {
  var form = document.querySelector('.rep-form[data-rform="' + cssEsc(key) + '"]');
  if (!form) return;
  var label = form.querySelector(".rf-label").value.trim();
  var due = form.querySelector(".rf-due").value;
  if (!label) { toast("Вкажіть назву періоду", "err"); return; }
  if (!due) { toast("Вкажіть дату", "err"); return; }
  var btn = form.querySelector(".rep-save");
  btn.disabled = true; btn.textContent = "…";
  var payload;
  if (btn.getAttribute("data-new") === "1") {
    payload = { kind: btn.getAttribute("data-kind"), projectId: btn.getAttribute("data-project"), period_label: label, due_date: due };
  } else {
    payload = { periodId: btn.getAttribute("data-period"), period_label: label, due_date: due };
  }
  apiPost("upsertReportingPeriod", payload).then(function (res) {
    if (res && res.ok) { toast(res.created ? "Період додано" : "Період оновлено", "ok"); reloadCurrent(); }
    else { toast(errMsg(res), "err"); btn.disabled = false; btn.textContent = payload.periodId ? "Зберегти" : "Додати"; }
  });
}

function cssEsc(s) { return String(s).replace(/["\\]/g, "\\$&"); }
function defaultPeriod() {
  var d = new Date();
  return d.getFullYear() + "-Q" + (Math.floor(d.getMonth() / 3) + 1);
}

function measFormHtml(indId, unit) {
  return '<div class="mf-row">' +
      '<input class="m-period" type="text" value="' + esc(defaultPeriod()) + '" placeholder="період (2026-Q3)">' +
      '<input class="m-value" type="number" step="any" placeholder="значення' + (unit ? ", " + esc(unit) : "") + '">' +
      '<input class="m-comment" type="text" placeholder="коментар (необов.)">' +
    '</div>' +
    '<div class="mf-actions">' +
      '<button class="m-save" data-ind="' + esc(indId) + '">Зберегти</button>' +
      '<button class="m-cancel" data-ind="' + esc(indId) + '">Скасувати</button>' +
    '</div>';
}

// форма задачі — для нової (mode:new, actId) і редагування (mode:edit, task)
function taskFormHtml(opts) {
  var isLead = myRole === "lead";
  var t = opts.mode === "edit" ? (opts.task || {}) : {};
  var key = opts.mode === "edit" ? ("task:" + opts.task.id) : ("new:" + opts.actId);
  var vis = String(t.visible_to || "participants+coord");

  // activity_id поточної задачі (для нової — actId, для редагування — з самої задачі)
  var actId = opts.mode === "new" ? opts.actId : String(t.activity_id);
  // задачі-сусіди під тією ж активністю (крім самої себе)
  var siblings = (_lastData.tasks || []).filter(function (x) {
    return String(x.activity_id) === String(actId) && String(x.id) !== String(t.id || "");
  });
  // які ID уже стоять у deps цієї задачі
  var curDeps = String(t.deps || "").split(/[;,]/).map(function (s) { return s.trim(); }).filter(Boolean);

  var depsBlock;
  if (siblings.length) {
    depsBlock = '<div class="tf-deps-wrap"><div class="tf-deps-cap">Спочатку треба виконати інші задачі цієї активності? Позначте їх:</div>' +
      siblings.map(function (s) {
        var on = curDeps.indexOf(String(s.id)) >= 0;
        return '<label class="tf-dep"><input type="checkbox" class="tf-dep-box" value="' + esc(s.id) + '"' + (on ? " checked" : "") + '> ' + esc(s.title) + '</label>';
      }).join("") + '</div>';
  } else {
    depsBlock = '<div class="tf-deps-wrap"><div class="tf-deps-cap" style="color:var(--ink-faint)">Інших задач під цією активністю ще нема — залежностей не буде.</div></div>';
  }

  var leadFields = isLead
    ? '<div class="tf-row">' +
        '<input class="tf-owner" type="text" value="' + esc(t.owner_email || "") + '" placeholder="головний відповідальний (email)">' +
        '<input class="tf-parts" type="text" value="' + esc(t.participants || "") + '" placeholder="учасники через ; (a@x;b@x)">' +
      '</div>'
    : '';

  return '<div class="tf-row">' +
      '<input class="tf-title" type="text" value="' + esc(t.title || "") + '" placeholder="назва задачі">' +
      '<input class="tf-due" type="date" value="' + esc(t.due_date ? String(t.due_date).slice(0,10) : "") + '">' +
    '</div>' +
    leadFields +
    '<div class="tf-row">' +
      '<select class="tf-vis">' +
        '<option value="participants+coord"' + (vis==="participants+coord"?" selected":"") + '>видно: учасники + координатор</option>' +
        '<option value="project"' + (vis==="project"?" selected":"") + '>видно: весь проєкт</option>' +
      '</select>' +
    '</div>' +
    depsBlock +
    '<label class="tf-cond"><input class="tf-cond-box" type="checkbox"' + (isTrue(t.conditional)?" checked":"") + '> Необов’язкова — виконується лише за потреби (не вважається простроченою)</label>' +
    '<div class="tf-actions">' +
      '<button class="tf-save" data-mode="' + esc(opts.mode) + '" data-key="' + esc(key) + '"' +
        (opts.mode==="new" ? ' data-act="' + esc(opts.actId) + '"' : ' data-task="' + esc(opts.task.id) + '"') + '>' +
        (opts.mode==="new" ? "Створити" : "Зберегти") + '</button>' +
      '<button class="tf-cancel" data-key="' + esc(key) + '">Скасувати</button>' +
    '</div>';
}

function submitTask(mode, key) {
  var tree = document.getElementById("tree");
  var form = tree.querySelector('.task-form[data-form="' + cssEsc(key) + '"]');
  if (!form) return;
  var title = form.querySelector(".tf-title").value.trim();
  if (!title) { toast("Вкажіть назву задачі", "err"); return; }
  var due = form.querySelector(".tf-due").value; // "" або YYYY-MM-DD
  var vis = form.querySelector(".tf-vis").value;
  var depEls = form.querySelectorAll(".tf-dep-box");
  var deps = Array.prototype.slice.call(depEls).filter(function (b) { return b.checked; })
    .map(function (b) { return b.value; }).join(";");
  var cond = form.querySelector(".tf-cond-box").checked;
  var payload = { title: title, due_date: due, visible_to: vis, deps: deps, conditional: cond };

  var ownerEl = form.querySelector(".tf-owner");
  if (ownerEl) { payload.owner_email = ownerEl.value.trim(); }
  var partsEl = form.querySelector(".tf-parts");
  if (partsEl) { payload.participants = partsEl.value.trim(); }

  var saveBtn = form.querySelector(".tf-save");
  if (mode === "new") { payload.activityId = saveBtn.getAttribute("data-act"); }
  else { payload.taskId = saveBtn.getAttribute("data-task"); }

  saveBtn.disabled = true; saveBtn.textContent = "…";
  apiPost("upsertTask", payload).then(function (res) {
    if (res && res.ok) { toast(res.created ? "Задачу створено" : "Задачу оновлено", "ok"); reloadCurrent(); }
    else { toast(errMsg(res), "err"); saveBtn.disabled = false; saveBtn.textContent = (mode === "new" ? "Створити" : "Зберегти"); }
  });
}

function submitMeasurement(indId) {
  var tree = document.getElementById("tree");
  var form = tree.querySelector('.meas-form[data-form="' + cssEsc(indId) + '"]');
  if (!form) return;
  var period = form.querySelector(".m-period").value.trim();
  var value = form.querySelector(".m-value").value;
  var comment = form.querySelector(".m-comment").value.trim();
  if (!period) { toast("Вкажіть період", "err"); return; }
  if (value === "" || isNaN(Number(value))) { toast("Значення має бути числом", "err"); return; }
  var saveBtn = form.querySelector(".m-save");
  if (saveBtn) { saveBtn.disabled = true; saveBtn.textContent = "…"; }
  apiPost("addMeasurement", { indicatorId: indId, period: period, value: Number(value), comment: comment }).then(function (res) {
    if (res && res.ok) { toast("Замір збережено", "ok"); reloadCurrent(); }
    else { toast(errMsg(res), "err"); if (saveBtn) { saveBtn.disabled = false; saveBtn.textContent = "Зберегти"; } }
  });
}

function errMsg(res) {
  if (!res) return "Немає відповіді від сервера";
  var map = {
    AUTH_REQUIRED: "Сесія застаріла — увійдіть знову",
    ACCESS_DENIED: "Немає доступу до проєкту",
    NOT_PARTICIPANT: "Лише учасники задачі можуть її змінювати",
    NOT_OWNER: "Лише власник індикатора може вносити заміри",
    NOT_FOUND: "Запис не знайдено",
    BAD_STATUS: "Недопустимий статус",
    BAD_VALUE: "Значення має бути числом",
    BAD_DATE: "Дата має бути у форматі рррр-мм-дд",
    BAD_PARENT: "Задачі чіпляються лише до активності",
    FORBIDDEN_FIELD: "Зміну owner/учасників робить координатор",
    FORBIDDEN: "Дію виконує лише координатор",
    BAD_FREQ: "У проєкті не задано періодичність звітів",
    BAD_PROJECT: "У проєкті немає дат початку/кінця",
    NOT_ALLOWED: "Недостатньо прав для цієї дії",
    ALREADY_SUBMITTED: "Поданий звіт не можна видалити — спершу зніміть «подано»",
    BAD_REQUEST: "Некоректний запит"
  };
  if (res.error === "AUTH_REQUIRED") { logout(); }
  return map[res.error] || ("Помилка: " + (res.message || res.error || "невідомо"));
}

// ── старт ──
window.addEventListener("load", function () {
  initGoogle();
  var saved = localStorage.getItem("cplr_pp_token");
  if (saved) {
    var info = decodeJwt(saved);
    if (info && info.exp && info.exp * 1000 > Date.now()) {
      authToken = saved;
      if (info.email) { myEmail = String(info.email).toLowerCase().trim(); document.getElementById("meEmail").textContent = info.email; }
      boot();
    } else { localStorage.removeItem("cplr_pp_token"); show("screenLogin"); }
  } else { show("screenLogin"); }
});
