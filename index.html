  const saveTasks=async(t,changedIdx)=>{
    const sorted=sortTasks(t);
    setTasks(sorted);localStorage.setItem("cppr_tasks",JSON.stringify(sorted));
    if(config.sheetsApiUrl){
      // Передаємо всі задачі одним POST-подібним GET через окремі рядки
      // Кожна задача окремим рядком через saveOneTask, але спочатку clearTasks
      // Використовуємо новий action saveAllTasksJson — один запит з усіма задачами у JSON чанках
      const chunkSize=10;
      await sheetsRequest(config.sheetsApiUrl,"clearTasks",{});
      for(let i=0;i<sorted.length;i+=chunkSize){
        const chunk=sorted.slice(i,i+chunkSize);
        await sheetsPost(config.sheetsApiUrl,"saveTasksChunk",{offset:i,tasks:chunk});
      }
    }
  };

  const triggerStatusNotification=(srcEv,newStatus)=>{
    const rule=notifications.find(n=>n.event===newStatus);
    if(!rule)return;
    const allRecipients=[...(rule.recipients||[]),...(rule.customEmails?rule.customEmails.split(",").map(e=>e.trim()).filter(Boolean):[])];
    if(!allRecipients.length)return;
    // Передаємо дані заявки напряму — не залежимо від збереження в таблиці
    const evName=srcEv?.form?.eventName||"Захід ЦППР";
    const evDate=srcEv?.form?.eventDate||"";
    const evType=srcEv?.form?.eventType||"";
    const evFormat=srcEv?.form?.eventFormat||"";
    const evCity=srcEv?.form?.city||"";
    const evExpert=srcEv?.form?.expertName||"";
    const evHead=srcEv?.form?.head||"";
    const evDonors=(srcEv?.form?.donors||[]).filter(d=>d!=="Без донора").join(", ");
     const evParticipants=srcEv?.form?.participants||"";
     const evCoordinator=srcEv?.form?.coordinator||"";
     const evComment=srcEv?.form?.notes||"";

                const _today=new Date();_today.setHours(0,0,0,0);
                const isOd=!t.done&&!!t.dlDate&&parseDlDate(t.dlDate)<_today;
                // Перевіряємо чи задача заблокована (є невиконані блокери)
                const blockers=!t.done&&t.deps?.length

                return<div key={idx}className={itemClass}style={{opacity:t.done?.5:1}}>

                    <div style={{fontSize:13,textDecoration:t.done?"line-through":"none",color:isOd?"var(--red)":isBlocked?"#92400E":"var(--text)",cursor:"pointer"}}onClick={()=>toggleCL(idx)}>

                      {t.t}

                          fontSize:10,fontWeight:600,marginLeft:6,padding:"1px 6px",borderRadius:10,
                          background:(t.blocksCount||0)>=10?"#FCEBEB":(t.blocksCount||0)>=4?"#FAEEDA":"#EBF4FB",
                          color:(t.blocksCount||0)>=10?"#A32D2D":(t.blocksCount||0)>=4?"#854F0B":"#185FA5",
                          cursor:"help"
                        }}>🔗 {t.blocksCount}</span>

                      {blockers.map((b,bi)=><span key={bi} style={{background:"#FEF3C7",color:"#92400E",padding:"0px 6px",borderRadius:8,fontSize:10}}>{b.t} ({b.who||'—'})</span>)}

                      <span style={{fontSize:10,color:"var(--text3)"}}>Виконано:</span>
                      <input type="date" value={t.doneAt||""}

                        onClick={e=>e.stopPropagation()}
                        style={{fontSize:10,padding:"1px 3px",border:"1px solid var(--border)",borderRadius:3,
                        background:t.doneAt&&t.dlDate&&t.doneAt>t.dlDate?"#FEF2F2":"#F0FDF4",
                        color:t.doneAt&&t.dlDate&&t.doneAt>t.dlDate?"var(--red)":"var(--green)",
                        fontFamily:"var(--font)",cursor:"pointer"}}/>

                        <span style={{fontSize:10,color:"var(--red)"}}>(запізнення {Math.round((new Date(t.doneAt)-parseDlDate(t.dlDate))/(1000*60*60*24))} дн.)</span>}

                    <div style={{fontSize:11,color:isOd?"var(--red)":"var(--text3)",marginTop:3,display:"flex",alignItems:"center",gap:6}}>

                        style={{fontSize:11,padding:"1px 4px",border:"1px solid var(--border)",borderRadius:4,background:"var(--bg-white)",color:isOd?"var(--red)":"var(--text2)",fontFamily:"var(--font)",cursor:"pointer",maxWidth:180}}>

                        onChange={e=>{e.stopPropagation();changeTaskDate(idx,e.target.value);}}

                        style={{fontSize:11,padding:"1px 4px",border:"1px solid var(--border)",borderRadius:4,background:t.manualDate?"#EBF4FB":"var(--bg-white)",color:isOd?"var(--red)":"var(--text2)",fontFamily:"var(--font)",cursor:"pointer"}}/>

                        style={{fontSize:11,color:"var(--text3)",background:"none",border:"none",cursor:"pointer",padding:"0 2px",marginLeft:"auto",flexShrink:0,lineHeight:1}}
                        title="Видалити задачу">✕</button>
                    </div>
                  </div>
                </div>;
              })}
            </div>
          ));
        })()}
    </div>}

                <div style={{padding:"8px 10px",textAlign:"right"}}>План, грн</div>
                <div style={{padding:"8px 10px",textAlign:"right"}}>Факт, грн</div>
                <div style={{padding:"8px 10px"}}>Коментар</div>
                <div></div>
              </div>
              {fb.map((r,i)=>(
                <div key={r.id}style={{display:"grid",gridTemplateColumns:"1fr 110px 110px 1.2fr 32px",gap:0,background:i%2?"var(--bg-card)":"var(--bg-white)",alignItems:"center",borderTop:"1px solid var(--border)"}}>
                  <input value={r.article}onChange={e=>updBudgetRow(r.id,"article",e.target.value)}placeholder="Назва статті"
                    style={{border:"none",background:"transparent",padding:"7px 10px",fontSize:13,fontFamily:"var(--font)",width:"100%"}}/>
                  <input value={r.plan}onChange={e=>updBudgetRow(r.id,"plan",e.target.value.replace(/[^\d.]/g,""))}inputMode="numeric"
                    style={{border:"none",background:"transparent",padding:"7px 10px",fontSize:13,fontFamily:"var(--font)",width:"100%",textAlign:"right"}}/>
                  <input value={r.fact}onChange={e=>updBudgetRow(r.id,"fact",e.target.value.replace(/[^\d.]/g,""))}inputMode="numeric"placeholder="—"
                    style={{border:"none",background:"transparent",padding:"7px 10px",fontSize:13,fontFamily:"var(--font)",width:"100%",textAlign:"right",fontWeight:600}}/>
                  <input value={r.note}onChange={e=>updBudgetRow(r.id,"note",e.target.value)}placeholder="напр. підрядник, причина різниці"
                    style={{border:"none",background:"transparent",padding:"7px 10px",fontSize:12,fontFamily:"var(--font)",width:"100%",color:"var(--text2)"}}/>
                  <button onClick={()=>delBudgetRow(r.id)}style={{background:"none",border:"none",color:"var(--text3)",cursor:"pointer",fontSize:13,padding:0}}title="Видалити рядок">✕</button>
                </div>
              ))}
              <div style={{display:"grid",gridTemplateColumns:"1fr 110px 110px 1.2fr 32px",gap:0,background:"var(--blue-light)",fontWeight:700,fontSize:13,borderTop:"1.5px solid var(--blue-mid)"}}>
                <div style={{padding:"9px 10px",color:"var(--blue-dark)"}}>Разом</div>
                <div style={{padding:"9px 10px",textAlign:"right",color:"var(--blue-dark)"}}>{fmt(sumPlan)}</div>
                <div style={{padding:"9px 10px",textAlign:"right",color:"var(--blue-dark)"}}>{fmt(sumFact)}</div>
                <div style={{padding:"9px 10px",fontSize:12,color:diff>0?"var(--red)":diff<0?"#00916E":"var(--text2)"}}>
                  {sumFact===0?"":diff>0?`перевитрата +${fmt(diff)}`:diff<0?`економія ${fmt(Math.abs(diff))}`:"точно за планом"}
                </div>
                <div></div>
              </div>
            </div>}
        <div className="alert-warn"style={{marginTop:14}}>Фактичні суми вписуються вручну. «План» можна підтягнути з кошторису заходу і за потреби скоригувати.</div>
      </div>;
    })()}
  </div></>;
}

ReactDOM.render(<App/>,document.getElementById("root"));
</script>
</body>
</html>
