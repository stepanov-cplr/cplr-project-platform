<style>
:root{
  --blue:#1C75BC;--blue-dark:#252868;--blue-hover:#0056A0;
  --blue-light:#E8F3FB;--blue-mid:#B8D9F0;
  --bg:#F0F4F8;--bg-white:#FFFFFF;--bg-card:#F5F8FC;
  --border:#D0DCE8;--border2:#1C75BC;
  --text:#1A2535;--text2:#6B7A90;--text3:#9AAABB;
  --green:#00916E;--green-light:#E6F5F1;
  --red:#DC2626;--red-light:#FEF2F2;
  --amber:#D97706;--amber-light:#FFFBEB;
  --shadow:0 1px 3px rgba(28,117,188,.12),0 1px 2px rgba(0,0,0,.06);
  --shadow-md:0 4px 12px rgba(28,117,188,.15);
  --radius:8px;--radius-lg:12px;
  --font:'Nunito',system-ui,sans-serif;
}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:var(--font);background:var(--bg);color:var(--text);min-height:100vh;font-size:14px}

/* HEADER */
.app-header{background:var(--bg-white);border-bottom:3px solid var(--blue);box-shadow:var(--shadow);position:sticky;top:0;z-index:100}
.header-inner{max-width:960px;margin:0 auto;padding:0 20px;height:56px;display:flex;align-items:center;gap:0}
.header-logo{width:40px;height:40px;object-fit:contain;flex-shrink:0}
.header-brand{display:flex;flex-direction:column;margin-left:10px}
.header-brand-name{font-size:14px;font-weight:700;color:var(--blue);line-height:1.2;letter-spacing:.01em}
.header-brand-sub{font-size:10px;color:var(--text2);line-height:1.2}
.header-divider{width:1px;height:28px;background:var(--blue);margin:0 16px;opacity:.3}
.header-title{font-size:13px;color:var(--text2);font-weight:500}
.header-right{margin-left:auto;display:flex;align-items:center;gap:8px}
.header-version{font-size:10px;color:var(--text3)}

.app{max-width:960px;margin:0 auto;padding:24px 20px 60px}

/* FORMS */
select,input[type=text],input[type=date],input[type=number],textarea{
  width:100%;padding:8px 11px;border:1.5px solid var(--border);border-radius:var(--radius);
  background:var(--bg-white);color:var(--text);font-size:13px;font-family:var(--font);outline:none;
  transition:border-color .15s,box-shadow .15s}
select:focus,input:focus,textarea:focus{border-color:var(--blue);box-shadow:0 0 0 3px rgba(28,117,188,.12)}
textarea{resize:vertical}
input[type=checkbox]{width:15px;height:15px;accent-color:var(--blue);cursor:pointer;flex-shrink:0}
button{font-family:var(--font);cursor:pointer}

/* BUTTONS */
.btn-primary{padding:8px 18px;background:var(--blue);color:#fff;border:none;border-radius:var(--radius);
  font-size:13px;font-weight:600;transition:background .15s,transform .1s;box-shadow:var(--shadow)}
.btn-primary:hover{background:var(--blue-hover)}
.btn-primary:active{transform:scale(.98)}
.btn-outline{padding:7px 14px;background:transparent;border:1.5px solid var(--border);border-radius:var(--radius);
  font-size:12px;color:var(--text2);font-weight:500;transition:all .15s}
.btn-outline:hover{border-color:var(--blue);color:var(--blue)}
.btn-ghost{padding:5px 10px;background:transparent;border:1.5px solid var(--blue);border-radius:var(--radius);
  font-size:11px;color:var(--blue);font-weight:600;transition:all .15s}
.btn-ghost:hover{background:var(--blue-light)}
.btn-danger{padding:5px 10px;background:transparent;border:1.5px solid #fca5a5;border-radius:var(--radius);font-size:11px;color:var(--red)}

/* CARDS */
.card{background:var(--bg-white);border:1.5px solid var(--border);border-radius:var(--radius-lg);
  padding:16px;box-shadow:var(--shadow)}
.card:hover{border-color:var(--blue-mid);box-shadow:var(--shadow-md)}

/* TAGS / BADGES */
.tag{display:inline-flex;align-items:center;font-size:11px;padding:3px 9px;border-radius:20px;font-weight:600;white-space:nowrap;gap:4px}

/* SECTION TITLE */
.section-title{font-size:10px;font-weight:700;color:var(--text2);text-transform:uppercase;
  letter-spacing:.1em;margin:22px 0 10px;display:flex;align-items:center;gap:6px}
.section-title::after{content:'';flex:1;height:1px;background:var(--border)}

/* FIELD */
.field{margin-bottom:12px}
.field-label{font-size:12px;color:var(--text2);margin-bottom:5px;font-weight:600}
.field-hint{font-size:11px;color:var(--text3);margin-top:3px}

/* GRID */
.grid2{display:grid;grid-template-columns:1fr 1fr;gap:12px}
.grid3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:10px}

/* CHECKBOX ROW */
.cb-row{display:flex;align-items:center;gap:8px;font-size:13px;cursor:pointer;padding:4px 0;
  color:var(--text);transition:color .15s}
.cb-row:hover{color:var(--blue)}

/* TABS */
.tabs{display:flex;border-bottom:2px solid var(--border);margin-bottom:20px;overflow-x:auto;gap:0}
.tab{padding:9px 16px;background:none;border:none;border-bottom:2px solid transparent;
  margin-bottom:-2px;color:var(--text2);cursor:pointer;font-size:13px;font-weight:500;
  white-space:nowrap;transition:all .15s;font-family:var(--font)}
.tab.active{border-bottom-color:var(--blue);color:var(--blue);font-weight:700}

/* STATUS BUTTONS */
.status-btn{padding:4px 10px;border-radius:20px;font-size:11px;font-weight:600;cursor:pointer;transition:all .15s;border:1.5px solid}

/* CHECKLIST */
.checklist-item{display:flex;align-items:flex-start;gap:10px;padding:9px 0;border-bottom:1px solid var(--bg-card);cursor:pointer;transition:opacity .15s}
.checklist-item.overdue{background:#fff8f8;border-left:3px solid var(--red);padding-left:8px;margin-left:-8px;border-radius:0 var(--radius) var(--radius) 0}
.checklist-item.blocked{background:#FFFBEB;border-left:3px solid #D97706;padding-left:8px;margin-left:-8px;border-radius:0 var(--radius) var(--radius) 0}
.chk-box{width:18px;height:18px;border-radius:5px;border:2px solid var(--border);background:var(--bg-white);
  flex-shrink:0;display:flex;align-items:center;justify-content:center;margin-top:1px;transition:all .15s}
.chk-box.done{border-color:var(--green);background:var(--green-light)}

/* METRIC CARDS */
.metric{background:var(--bg-card);border-radius:var(--radius);padding:14px 16px;border:1px solid var(--border)}
.metric-label{font-size:11px;color:var(--text2);margin-bottom:4px;font-weight:600;text-transform:uppercase;letter-spacing:.06em}
.metric-value{font-size:20px;font-weight:700;color:var(--text)}

/* BUDGET */
.budget-row{display:flex;justify-content:space-between;padding:9px 14px;font-size:13px;border-bottom:1px solid var(--bg-card)}
.budget-total{display:flex;justify-content:space-between;padding:12px 14px;background:var(--blue-light);font-weight:700;border-top:2px solid var(--blue-mid)}

/* ALERTS */
.alert-warn{background:var(--amber-light);border:1px solid #FDE68A;border-radius:var(--radius);padding:10px 13px;font-size:12px;color:#92400E}
.alert-info{background:var(--blue-light);border:1px solid var(--blue-mid);border-radius:var(--radius);padding:10px 13px;font-size:12px;color:#1E40AF}
.alert-danger{background:var(--red-light);border:1px solid #FECACA;border-radius:var(--radius);padding:10px 13px;font-size:12px;color:#991B1B}
.alert-success{background:var(--green-light);border:1px solid #A7F3D0;border-radius:var(--radius);padding:10px 13px;font-size:12px;color:#065F46}

/* MISC */
.multi-check{display:flex;flex-wrap:wrap;gap:7px;margin-top:4px}
.multi-check-item{display:flex;align-items:center;gap:5px;padding:5px 11px;border:1.5px solid var(--border);
  border-radius:20px;cursor:pointer;font-size:12px;font-weight:500;background:var(--bg-white);transition:all .15s}
.multi-check-item.selected{border-color:var(--blue);background:var(--blue-light);color:var(--blue)}
.coffee-pair{background:var(--bg-card);border:1px solid var(--border);border-radius:var(--radius);padding:10px;margin-bottom:8px}
.security-section{background:#FFFBEB;border:1.5px solid #FDE68A;border-radius:var(--radius-lg);padding:14px;margin-bottom:4px}
.contractor-section{background:#F0FDF4;border:1.5px solid #A7F3D0;border-radius:var(--radius-lg);padding:14px;margin-top:8px}
.copy-btn{padding:4px 10px;border:1.5px solid var(--blue);border-radius:var(--radius);background:transparent;color:var(--blue);font-size:11px;font-weight:600;cursor:pointer;font-family:var(--font)}
.task-card{border:1.5px solid var(--border);border-radius:var(--radius-lg);margin-bottom:10px;overflow:hidden;background:var(--bg-white)}
.task-card-head{display:flex;justify-content:space-between;align-items:center;padding:10px 14px;background:var(--bg-card);border-bottom:1px solid var(--border)}
.task-card-body{padding:10px 14px}
.task-line{font-size:12px;padding:4px 0;border-bottom:1px solid var(--bg-card);display:flex;gap:6px;align-items:baseline}
.task-line:last-child{border-bottom:none}
.setup-banner{background:var(--amber-light);border:1.5px solid #FDE68A;border-radius:var(--radius-lg);padding:14px 16px;margin-bottom:20px;font-size:13px}
.settings-section{background:var(--bg-white);border:1.5px solid var(--border);border-radius:var(--radius-lg);padding:16px;margin-bottom:14px}
.donor-badge{display:inline-flex;align-items:center;gap:4px;padding:2px 8px;background:var(--blue-light);
  color:var(--blue);border-radius:20px;font-size:11px;font-weight:600}
.spinner{display:inline-block;width:18px;height:18px;border:2px solid var(--border);border-top-color:var(--blue);border-radius:50%;animation:spin .6s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
.toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%);background:var(--text);color:#fff;
  padding:10px 20px;border-radius:var(--radius);font-size:13px;z-index:9999;opacity:0;
  transition:opacity .3s;pointer-events:none;font-family:var(--font);font-weight:500}
.toast.show{opacity:1}

/* DOC MODAL */
.modal-overlay{position:fixed;inset:0;background:rgba(26,37,53,.5);z-index:200;display:flex;align-items:center;justify-content:center;padding:20px}
.modal{background:var(--bg-white);border-radius:var(--radius-lg);padding:24px;max-width:500px;width:100%;box-shadow:var(--shadow-md)}
.modal-title{font-size:16px;font-weight:700;margin-bottom:16px;color:var(--text)}
</style>
</head>

// ══ UTILS ══════════════════════════════════════════════
function gc(costs,cat,key,city){const m=costs[cat]||DEFAULT_COSTS[cat];return((m[city])||m.def||{})[key]||0;}

function calcBudget(f,costs){
  const C=costs||DEFAULT_COSTS;const city=f.city||"Київ";const p=parseInt(f.participants)||0;
  const isOnline=f.eventFormat==="Онлайн";
  let total=0;const lines=[];
  if(f.needHall&&!isOnline){
    const fd=f.duration==="Повний день"||f.duration==="Кілька днів";
    const pp=p<=50?(fd?"sf":"sh"):p<=100?(fd?"mf":"mh"):(fd?"lf":"lh");
    const a=gc(C,"hall",pp,city);
    if(a){total+=a;lines.push({label:`Оренда залу (${f.duration||"повний день"})`,amount:a});}
  }
  // Welcome coffee
  if(f.coffeeWelcome&&p>0){const key=f.coffeeWelcomeType==="light"?"cb":f.coffeeWelcomeType==="ext"?"cp":"cs";const a=gc(C,"cat",key,city)*p;total+=a;lines.push({label:`Вітальна кава (${p} ос)`,amount:a});}
  // Coffee breaks
  if(f.coffeeBreak&&p>0){const cnt=parseInt(f.coffeeBreakCount)||1;const key=f.coffeeBreakType==="light"?"cb":f.coffeeBreakType==="ext"?"cp":"cs";const a=gc(C,"cat",key,city)*p*cnt;total+=a;lines.push({label:`Кава-паузи ${cnt}×${p} ос`,amount:a});}
  // Final coffee
  if(f.coffeeFinal&&p>0){const key=f.coffeeFinalType==="light"?"cb":f.coffeeFinalType==="buffet"?"frs":f.coffeeFinalType==="ext"?"cp":"cs";const a=gc(C,"cat",key,city)*p;total+=a;lines.push({label:`Фінальна кава${f.coffeeFinalType==="buffet"?" (фуршет)":""} (${p} ос)`,amount:a});if(f.coffeeFinalWine&&p>0){const wine=Math.round(300*p);total+=wine;lines.push({label:`Вино (${p} ос)`,amount:wine});}}
  if(f.breakfast&&p>0){const a=400*p;total+=a;lines.push({label:`Сніданок (${p} ос)`,amount:a});}
  if(f.water&&p>0){const a=gc(C,"cat","w",city)*p;total+=a;lines.push({label:`Вода (${p} ос)`,amount:a});}
  if(f.lunch&&p>0){const a=gc(C,"cat","lb",city)*p;total+=a;lines.push({label:`Обід (${p} ос)`,amount:a});}
  if(f.dinner&&p>0){const a=gc(C,"cat","frs",city)*p;total+=a;lines.push({label:`Вечеря (${p} ос)`,amount:a});}
  if(f.translation){const a=gc(C,"tech","tr",city);total+=a;lines.push({label:"Синхронний переклад",amount:a});}
  const hasStream=f.stream||f.streamYoutubeUkr||f.streamYoutubeEng||f.streamCrosspost||f.streamFB;
  if(hasStream){
    if(f.confService){
      const hasCrosspost=f.streamYoutubeUkr||f.streamYoutubeEng||f.streamCrosspost||f.streamFB;
      const streamAmt=hasCrosspost?38000:31000;
      total+=streamAmt;lines.push({label:`Трансляція + обладнання (конференц-сервіс)`,amount:streamAmt});
    } else {
      const a=gc(C,"tech","st",city);total+=a;lines.push({label:"Онлайн-трансляція",amount:a});
    }
  }
  if(f.photographer){const hrs=parseInt(f.photographerHours)||1;const a=gc(C,"tech","ph",city)*hrs;total+=a;lines.push({label:`Фотограф (${hrs} год)`,amount:a});}
  if(f.videographer){const a=gc(C,"tech","vd",city);total+=a;lines.push({label:"Відеооператор",amount:a});}
  if(f.badges&&p>0){const a=gc(C,"tech","bg",city)*p;total+=a;lines.push({label:`Бейджі (${p} ос)`,amount:a});}
  if(f.printedPrograms&&p>0){const a=gc(C,"tech","pr",city)*p;total+=a;lines.push({label:`Програми (${p} ос)`,amount:a});}
  if(f.confService&&total>0){const fee=Math.round(total*(C.confFee||10)/100);total+=fee;lines.push({label:`Конференц-сервіс (${C.confFee||5}%)`,amount:fee});}
  return{total,lines};
}

function genChecklist(f,taskTemplates,team){
  const ed=f.eventDate?new Date(f.eventDate):null;
  const today=new Date();today.setHours(0,0,0,0);
  const dd=d=>{
    if(d===0)return{label:"День заходу",date:ed};
    if(d<0){const dt=ed?new Date(ed):null;dt&&dt.setDate(dt.getDate()+Math.abs(d));return{label:`${Math.abs(d)} дн. після`,date:dt};}
    if(!ed)return{label:`за ${d} днів`,date:null};
    const dt=new Date(ed);dt.setDate(dt.getDate()-d);return{label:dt.toLocaleDateString("uk-UA"),date:dt};
  };
  const roleMap={
    expert:f.expertName||"Експерт",coord:f.coordinator||"Координатор",
    comm:f.commManager||"Комунікаційник",dmitro:"Український Дмитро",
    assist:f.assistant||"Асистент",other:"Відповідальний",
    fin:f.coordinator||f.assistant||"Фінансовий координатор",
    head:f.head||"Керівник проєкту",
  };
  const condMap={
    registrationForm:!!f.registrationForm,
    hasDonor:!!(f.donors&&f.donors.length>0&&!(f.donors.length===1&&f.donors[0]==="Без донора")),
    websiteAnnounce:!!f.websiteAnnounce,media:!!f.media,hasCoffee:!!(f.coffeeWelcome||f.coffeeBreak||f.coffeeFinal||f.breakfast||f.lunch||f.dinner),
    translation:!!f.translation,confService:!!f.confService,photographer:!!f.photographer,
    videographer:!!f.videographer,donorApproval:!!f.donorApproval,nameplates:!!f.nameplates,
    banner:!!f.banner,stream:!!(f.stream||f.streamYoutubeUkr||f.streamYoutubeEng||f.streamFB||f.streamCrosspost),needHall:!!f.needHall,pressRelease:!!f.pressRelease,
    publishResearch:!!f.publishResearch,donorReport:!!f.donorReport,newsOnEventDay:!!f.newsOnEventDay,
    flipchart:!!f.flipchart,folders:!!f.folders,notebooks:!!f.notebooks,badges:!!f.badges,
    hasAccommodation:!!(parseInt(f.accommodation)>0),hasTravel:!!(parseInt(f.travel)>0),
    hasAccommodationOrTravel:!!(parseInt(f.accommodation)>0||parseInt(f.travel)>0),
    inviteTranslation:!!f.inviteTranslation,
    printSmall:!!f.printSmall,
    printLarge:!!f.printLarge,
    anthem:!!f.anthem,
    minuteSilence:!!f.minuteSilence,
  };
  const allTasks=mergeTaskDeps(taskTemplates||DEFAULT_TASKS, window.__taskDeps||{deps:[],independent:[]});
  const blocksMap=calcBlocksCount(allTasks);
  return allTasks.filter(t=>!t.cond||condMap[t.cond]!==false&&condMap[t.cond]!==undefined?!t.cond||!!condMap[t.cond]:false).map(t=>{
    const dl=dd(t.d);const isOverdue=dl.date&&dl.date<today;
    return{...t,who:roleMap[t.role]||t.role,dl:dl.label,dlDate:dl.date?.toISOString(),done:false,overdue:isOverdue,blocksCount:blocksMap[t.t]||0};
  });
}

async function sheetsRequest(apiUrl,action,data){
  if(!apiUrl)return null;
  try{
    let url=`${apiUrl}?action=${encodeURIComponent(action)}`;
    if(data)for(const[k,v]of Object.entries(data))url+=`&${k}=${encodeURIComponent(typeof v==="object"?JSON.stringify(v):v)}`;
    if(window.__authToken)url+=`&authToken=${encodeURIComponent(window.__authToken)}`;
    const r=await fetch(url,{method:"GET",redirect:"follow"});
    const text=await r.text();
    try{const j=JSON.parse(text);if(j&&j.error==="AUTH_REQUIRED"&&action!=="checkAccess"){window.__onAuthExpired&&window.__onAuthExpired();}return j;}catch{return null;}
  }catch(e){console.error(e);return null;}
}
// POST для великих даних (чеклист, задачі) — обходить ліміт GET URL
async function sheetsPost(apiUrl,action,data){
  if(!apiUrl)return null;
  try{
    const body=JSON.stringify({action,authToken:window.__authToken||"",...data});
    const r=await fetch(apiUrl,{method:"POST",redirect:"follow",headers:{"Content-Type":"text/plain"},body});
    const text=await r.text();
    try{const j=JSON.parse(text);if(j&&j.error==="AUTH_REQUIRED"){window.__onAuthExpired&&window.__onAuthExpired();}return j;}catch{return null;}
  }catch(e){console.error(e);return null;}
}

function showToast(msg,type="info"){
  const t=document.getElementById("toast");t.textContent=msg;t.classList.add("show");
  setTimeout(()=>t.classList.remove("show"),2800);
}
function copyText(text){
  navigator.clipboard.writeText(text).then(()=>showToast("Скопійовано!")).catch(()=>{
    const ta=document.createElement("textarea");ta.value=text;document.body.appendChild(ta);ta.select();document.execCommand("copy");document.body.removeChild(ta);showToast("Скопійовано!");
  });
}

function DonorMultiSelect({donors,selected,onChange}){

    const active=sel.includes(o);

}


function generateReportHTML(ev) {
  const f = ev.form || {};
  const cl = (ev.checklist || []).filter(t => !t.manualDelete);
  const today = new Date(); today.setHours(0,0,0,0);
  const eventDate = f.eventDate ? new Date(f.eventDate) : null;
  const isAfterEvent = eventDate && today > eventDate;
  const fmt = d => {
    if(!d) return '—';
    // Підтримуємо і YYYY-MM-DD і повний ISO формат
    const s = d.length === 10 ? d : d.slice(0,10);
    const [y,m,dy] = s.split('-');
    return dy+'.'+m+'.'+y;
  };
  const daysDiff = (a,b) => Math.round((new Date(a)-new Date(b))/(1000*60*60*24));

  // Статистика
  const total = cl.length;
  const done = cl.filter(t=>t.done).length;
  const notDone = total - done;
  const overdue = cl.filter(t=>!t.done&&t.dlDate&&parseDlDate(t.dlDate)<today).length;
  const lateExec = cl.filter(t=>t.done&&t.doneAt&&t.dlDate&&t.doneAt>t.dlDate);
  const earlyExec = cl.filter(t=>t.done&&t.doneAt&&t.dlDate&&t.doneAt<t.dlDate);
  const onTime = cl.filter(t=>t.done&&(!t.dlDate||!t.doneAt||t.doneAt<=t.dlDate)).length;
  const pct = total ? Math.round(done/total*100) : 0;
  // Прогрес задач ДО заходу (d>0 — підготовчі, найважливіші; день заходу і після не враховуються)
  const preCl = cl.filter(t=>(t.d!=null?t.d:0)>0);
  const preTotal = preCl.length;
  const preDone = preCl.filter(t=>t.done).length;
  const prePct = preTotal ? Math.round(preDone/preTotal*100) : 0;

  // Рядки early birds
  const earlyRows = earlyExec.sort((a,b)=>daysDiff(a.doneAt,a.dlDate)>daysDiff(b.doneAt,b.dlDate)?1:-1)
    .map(t=>`<tr style="background:#F0FDF4">
      <td>${t.t}</td><td>${t.who||'—'}</td>
      <td style="color:#666">${fmt(t.dlDate)}</td>
      <td style="color:#00916E;font-weight:500">${fmt(t.doneAt)}</td>
      <td style="color:#00916E">-${Math.abs(daysDiff(t.doneAt,t.dlDate))} дн.</td>
    </tr>`).join('');

  // По виконавцях — функція для заданого набору
  const buildWhoRows=(taskSet)=>{
    const bw={};
    taskSet.forEach(t=>{
      const w=t.who||'—';
      if(!bw[w])bw[w]={total:0,done:0,late:0,overdue:0,lateSum:0};
      bw[w].total++;
      if(t.done)bw[w].done++;
      if(t.done&&t.doneAt&&t.dlDate&&t.doneAt>t.dlDate){bw[w].late++;bw[w].lateSum+=daysDiff(t.doneAt,t.dlDate);}
      if(!t.done&&t.dlDate&&parseDlDate(t.dlDate)<today)bw[w].overdue++;
    });
    return Object.entries(bw).sort((a,b)=>b[1].total-a[1].total).map(([who,s])=>{
      const pct=Math.round(s.done/s.total*100);
      const bar=`<div style="background:#e5e7eb;border-radius:4px;height:6px;width:80px;display:inline-block;vertical-align:middle;margin-left:6px"><div style="background:${pct>=80?'#00916E':pct>=50?'#1C75BC':'#DC2626'};width:${pct}%;height:100%;border-radius:4px"></div></div>`;
      return `<tr>
        <td style="font-weight:500">${who}</td>
        <td style="text-align:center">${s.total}</td>
        <td style="text-align:center;color:${s.done===s.total?'#00916E':'#1C75BC'}">${s.done}</td>
        <td style="text-align:center;color:${s.overdue>0?'#DC2626':'#666'}">${s.overdue||'—'}</td>
        <td style="text-align:center;color:${s.late>0?'#D97706':'#666'}">${s.late||'—'}${s.late?` <span style="font-size:10px;color:#999">(~${Math.round(s.lateSum/s.late)} дн.)</span>`:''}</td>
        <td>${bar} <span style="font-size:11px;color:#666">${pct}%</span></td>
      </tr>`;
    }).join('');
  };
  const whoRows = buildWhoRows(cl);
  const preWhoRows = buildWhoRows(cl.filter(t=>(t.d!=null?t.d:0)>0));

  // Прострочені
  const overdueDaysCalc=dlDate=>Math.round((today-parseDlDate(dlDate))/(1000*60*60*24));
  const overdueRows = cl.filter(t=>!t.done&&t.dlDate&&parseDlDate(t.dlDate)<today)
    .sort((a,b)=>a.dlDate>b.dlDate?1:-1)
    .map(t=>`<tr style="background:#FEF2F2">
      <td>${t.t}</td><td>${t.who||'—'}</td><td style="color:#DC2626;font-weight:500">${fmt(t.dlDate)}</td>
      <td style="color:#DC2626">+${overdueDaysCalc(t.dlDate)} дн.</td>
    </tr>`).join('');

  // Виконані із запізненням
  const lateRows = lateExec.sort((a,b)=>daysDiff(a.doneAt,a.dlDate)<daysDiff(b.doneAt,b.dlDate)?1:-1)
    .map(t=>`<tr style="background:#FFFBEB">
      <td>${t.t}</td><td>${t.who||'—'}</td>
      <td style="color:#666">${fmt(t.dlDate)}</td>
      <td style="color:#D97706;font-weight:500">${fmt(t.doneAt)}</td>
      <td style="color:#D97706">+${daysDiff(t.doneAt,t.dlDate)} дн.</td>
    </tr>`).join('');

  // Всі задачі
  const groups=[...new Set(cl.map(t=>t.g))];
  const allTasksHTML = groups.map(g=>{
    const tasks=cl.filter(t=>t.g===g);
    const rows=tasks.map(t=>{
      const isLate=t.done&&t.doneAt&&t.dlDate&&t.doneAt>t.dlDate;
      const dlP=parseDlDate(t.dlDate);
      const isOvd=!t.done&&dlP&&dlP<today;
      const isProblem=isLate||isOvd;
      const bg=isProblem?'#FEF2F2':t.done?'#F0FDF4':'#fff';
      const nameColor=isProblem?'#B91C1C':t.done?'#999':'#1A2535';
      const nameWeight=isProblem?'font-weight:600;':'';
      const dlColor=isOvd?'#B91C1C':isLate?'#D97706':'inherit';
      const doneColor=isLate?'#D97706':'#166534';
      const lateSuffix=isLate?` <span style="font-size:10px;color:#D97706">+${daysDiff(t.doneAt,t.dlDate)} дн.</span>`:'';
      // Перевіряємо чи задача заблокована
      const _blockers=!t.done&&t.deps?.length?t.deps.map(dn=>{const dt=cl.find(x=>x.t===dn&&!x.done&&!x.manualDelete);return dt?dt:null;}).filter(Boolean):[];
      const isBlocked=_blockers.length>0&&!isOvd;
      const blockedBg=isBlocked&&!isProblem?'#FFFBEB':bg;
      const blockedNameColor=isBlocked&&!isProblem?'#92400E':nameColor;
      const status=t.done?(isLate?`<span style="color:#D97706;font-weight:600">запізнення</span>`:`<span style="color:#00916E;font-weight:500">вчасно</span>`)
        :(isOvd?`<span style="color:#DC2626;font-weight:600">прострочено</span>`:isBlocked?`<span style="color:#92400E;font-weight:500">🔒 заблоковано</span>`:`<span style="color:#166534;font-weight:500">очікує</span>`);
      const blockerInfo=isBlocked?`<div style="font-size:9px;color:#92400E;margin-top:2px">Чекає: ${_blockers.map(b=>b.t+' ('+( b.who||'—')+')').join(', ')}</div>`:'';
      return `<tr style="background:${blockedBg}">
        <td style="color:${blockedNameColor};${nameWeight}${t.done&&!isProblem?'text-decoration:line-through;':''}">${t.t}${blockerInfo}</td>
        <td>${t.who||'—'}</td>
        <td style="color:${dlColor};white-space:nowrap">${fmt(t.dlDate)}</td>
        <td style="color:${t.done?doneColor:'inherit'};white-space:nowrap">${t.done&&t.doneAt?fmt(t.doneAt):'—'}${lateSuffix}</td>
        <td>${status}</td>
      </tr>`;
    }).join('');
    return `<h3>${g}</h3><table><thead><tr><th>Задача</th><th>Виконавець</th><th>Дедлайн</th><th>Виконано</th><th>Статус</th></tr></thead><tbody>${rows}</tbody></table>`;
  }).join('');

  const mode = isAfterEvent ? 'Підсумковий звіт' : 'Звіт у процесі підготовки';
  const modeColor = isAfterEvent ? '#252868' : '#1C75BC';

  return `<!DOCTYPE html><html lang="uk"><head><meta charset="UTF-8">
  <title>Звіт — ${f.eventName||'Захід ЦППР'}</title>
  <style>
    body{font-family:Arial,sans-serif;max-width:900px;margin:40px auto;padding:0 20px;color:#1A2535;font-size:13px}

    .progress-fill{height:100%;border-radius:8px;background:${pct>=80?'#00916E':pct>=50?'#1C75BC':'#DC2626'};width:${pct}%}
    .progress-fill-pre{height:100%;border-radius:8px;background:${prePct>=80?'#00916E':prePct>=50?'#1C75BC':'#DC2626'};width:${prePct}%}

  ${preWhoRows?`<h2 style="color:#1C4A7A">🎯 Зведення по виконавцях — підготовка до заходу</h2>
  <table><thead><tr><th>Виконавець</th><th>Всього</th><th>Виконано</th><th>Прострочено</th><th>Із запізненням</th><th>Прогрес</th></tr></thead>
  <tbody>${preWhoRows}</tbody></table>`:''}

  <h2>Зведення по виконавцях — всі задачі</h2>
  <table><thead><tr><th>Виконавець</th><th>Всього</th><th>Виконано</th><th>Прострочено</th><th>Із запізненням</th><th>Прогрес</th></tr></thead>
  <tbody>${whoRows}</tbody></table>

  ${overdueRows?`<h2>⚠ Прострочені задачі (${overdue})</h2>
  <table><thead><tr><th>Задача</th><th>Виконавець</th><th>Дедлайн</th><th>Запізнення</th></tr></thead>
  <tbody>${overdueRows}</tbody></table>`:''}

  ${lateRows?`<h2>⏱ Виконані із запізненням (${lateExec.length})</h2>
  <table><thead><tr><th>Задача</th><th>Виконавець</th><th>Дедлайн</th><th>Виконано</th><th>Запізнення</th></tr></thead>
  <tbody>${lateRows}</tbody></table>`:''}

  ${earlyRows?`<h2>⚡ Виконані з випередженням (${earlyExec.length})</h2>
  <table><thead><tr><th>Задача</th><th>Виконавець</th><th>Дедлайн</th><th>Виконано</th><th>Випередження</th></tr></thead>
  <tbody>${earlyRows}</tbody></table>`:''}

  ${isAfterEvent&&notDone>0?`<h2>✗ Невиконані задачі (${notDone})</h2>
  <table><thead><tr><th>Задача</th><th>Виконавець</th><th>Дедлайн</th></tr></thead>
  <tbody>${cl.filter(t=>!t.done).map(t=>`<tr style="background:#FEF2F2"><td>${t.t}</td><td>${t.who||'—'}</td><td>${fmt(t.dlDate)}</td></tr>`).join('')}</tbody></table>`:''}

  ${(()=>{
    // AAR: будуємо зворотній граф з deps які є в чеклисті
    const bbMap=buildBlockedByMapFront(cl);
    const problematic=cl.filter(t=>{
      const isLate=t.done&&t.doneAt&&t.dlDate&&t.doneAt>t.dlDate;
      return isLate||!t.done;
    });
    const aarItems=problematic.map(pt=>{
      const isLate=pt.done&&pt.doneAt&&pt.dlDate&&pt.doneAt>pt.dlDate;
      const lateDays=isLate?daysDiff(pt.doneAt,pt.dlDate):null;
      const ptDl=parseDlDate(pt.dlDate);
      const ptOverdue=!pt.done&&ptDl&&ptDl<today;
      const ptDaysOver=ptOverdue?Math.round((today-ptDl)/(1000*60*60*24)):null;
      const allBlocked=getAllBlockedFront(pt.t,bbMap);
      if(!allBlocked.length)return'';
      const affected=allBlocked.map(bName=>{
        const bt=cl.find(x=>x.t===bName);
        if(!bt)return null;
        const btLate=bt.done&&bt.doneAt&&bt.dlDate&&bt.doneAt>bt.dlDate;
        const btDl=parseDlDate(bt.dlDate);
        const btOverdue=!bt.done&&btDl&&btDl<today;
        const btDaysLeft=btDl?Math.round((btDl-today)/(1000*60*60*24)):null;
        return{t:bt.t,who:bt.who,done:bt.done,late:btLate,lateDays:btLate?daysDiff(bt.doneAt,bt.dlDate):null,notDone:!bt.done,overdue:btOverdue,daysLeft:btDaysLeft,dlDate:bt.dlDate};
      }).filter(Boolean);
      const impacted=affected.filter(x=>x.late||x.overdue);
      const pending=affected.filter(x=>x.notDone&&!x.overdue);
      const okTasks=affected.filter(x=>!x.late&&!x.notDone);
      // Заголовок
      const ptDaysLeft=ptDl?Math.round((ptDl-today)/(1000*60*60*24)):null;
      const dlBadge=isLate
        ?`<span style="background:#FEF3C7;color:#92400E;font-size:10px;padding:1px 7px;border-radius:10px;margin-left:6px">дедлайн: ${fmt(pt.dlDate)}</span>`
        :ptOverdue
          ?`<span style="background:#FEE2E2;color:#B91C1C;font-size:10px;padding:1px 7px;border-radius:10px;margin-left:6px">дедлайн: ${fmt(pt.dlDate)} · прострочено ${ptDaysOver} дн.</span>`
          :ptDl
            ?`<span style="background:#E8F5E9;color:#166534;font-size:10px;padding:1px 7px;border-radius:10px;margin-left:6px">дедлайн: ${fmt(pt.dlDate)} · залишилось ${ptDaysLeft} дн.</span>`
            :'';
      const titleText=isLate
        ?`⏱ <b>${pt.t}</b> — запізнення <b style="color:#D97706">+${lateDays} дн.</b> (${pt.who||'—'}) ${dlBadge}`
        :`✗ <b>${pt.t}</b> — не виконано (${pt.who||'—'}) ${dlBadge}`;
      // Таблиця: прострочені + запізнілі
      const impactedHtml=impacted.length?`
        <div style="font-size:10px;font-weight:700;color:#B91C1C;margin:6px 0 3px">Можливий вплив на ${impacted.length} задач${impacted.length===1?'у':''}:</div>
        <table style="width:100%;border-collapse:collapse;font-size:11px;margin-bottom:4px">
          <tr style="background:#FEE2E2"><th style="padding:4px 7px;border:1px solid #FECACA;text-align:left">Задача</th><th style="padding:4px 7px;border:1px solid #FECACA">Виконавець</th><th style="padding:4px 7px;border:1px solid #FECACA">Дедлайн</th><th style="padding:4px 7px;border:1px solid #FECACA">Стан</th></tr>
          ${impacted.map(x=>{
            const dlColor=x.overdue?'#B91C1C':'#D97706';
            const dlSub=x.overdue?`<br><span style="font-size:10px">прострочено ${Math.abs(x.daysLeft)} дн.</span>`:(x.late?`<br><span style="font-size:10px">+${x.lateDays} дн. запізн.</span>`:'');
            const stText=x.overdue?'Не виконано':`+${x.lateDays} дн. запізн.`;
            return`<tr style="background:#FFF5F5"><td style="padding:4px 7px;border:1px solid #FECACA">${x.t}</td><td style="padding:4px 7px;border:1px solid #FECACA;color:#666">${x.who||'—'}</td><td style="padding:4px 7px;border:1px solid #FECACA;color:${dlColor};font-weight:500;white-space:nowrap">${fmt(x.dlDate)}${dlSub}</td><td style="padding:4px 7px;border:1px solid #FECACA;color:${dlColor};font-weight:600">${stText}</td></tr>`;}).join('')}
        </table>`:'';
      // Таблиця: очікують (дедлайн попереду)
      const pendingHtml=pending.length?`
        <div style="font-size:10px;font-weight:700;color:#92400E;margin:6px 0 3px">⚠ Під загрозою (${pending.length}) — залежить від невиконаної задачі, але ще є час:</div>
        <table style="width:100%;border-collapse:collapse;font-size:11px;margin-bottom:4px">
          <tr style="background:#F0FAF4"><th style="padding:4px 7px;border:1px solid #BBE0CC;text-align:left">Задача</th><th style="padding:4px 7px;border:1px solid #BBE0CC">Виконавець</th><th style="padding:4px 7px;border:1px solid #BBE0CC">Дедлайн</th><th style="padding:4px 7px;border:1px solid #BBE0CC">Стан</th></tr>
          ${pending.map(x=>`<tr style="background:#F0FAF4"><td style="padding:4px 7px;border:1px solid #BBE0CC">${x.t}</td><td style="padding:4px 7px;border:1px solid #BBE0CC;color:#666">${x.who||'—'}</td><td style="padding:4px 7px;border:1px solid #BBE0CC;color:#166534;font-weight:500;white-space:nowrap">${fmt(x.dlDate)}<br><span style="font-size:10px">залишилось ${x.daysLeft} дн.</span></td><td style="padding:4px 7px;border:1px solid #BBE0CC;color:#166534;font-weight:500">Очікує</td></tr>`).join('')}
        </table>`:'';
      // Варіант C: міні-таблиця для вчасно виконаних
      const okHtml=okTasks.length?`
        <div style="font-size:10px;font-weight:500;color:#6B7A90;margin:6px 0 3px">Залежні задачі:</div>
        <table style="width:100%;border-collapse:collapse;font-size:11px;margin-bottom:4px">
          ${okTasks.map(x=>`<tr style="background:#F0FAF4"><td style="padding:4px 7px;border:1px solid #BBE0CC;color:#166534"><span style="font-size:12px">✓</span> ${x.t}</td><td style="padding:4px 7px;border:1px solid #BBE0CC;color:#166534;text-align:center;width:80px;font-weight:500">вчасно</td></tr>`).join('')}
        </table>`:'';
      return`<div style="margin-bottom:12px;padding:10px 14px;border:1px solid #FCA5A5;border-radius:6px;background:#fff">
        <div style="font-size:12px;color:${isLate?'#D97706':'#DC2626'};margin-bottom:6px">${titleText}</div>
        ${impactedHtml}${pendingHtml}${okHtml}
      </div>`;
    }).filter(Boolean).join('');
    if(!aarItems)return'';
    return`<h2 style="color:#DC2626;border-bottom:2px solid #DC262633">🔍 AAR: Аналіз залежностей та впливу</h2>
      <p style="font-size:11px;color:#6B7A90;margin-bottom:10px">Задачі виконані із запізненням або не виконані — та їх вплив на залежні задачі.</p>
      ${aarItems}`;
  })()}


  <h2>Повна хронологія задач</h2>
  ${allTasksHTML}

  <div class="footer">ЦППР — Центр політико-правових реформ · pravo.org.ua · Звіт сформовано: ${new Date().toLocaleString('uk-UA')}</div>
  </body></html>`;
}

// ══ GENERATE DOCUMENT HTML ══════════════════════════════
function generateDocHTML(ev,budget,blocks,docType){
  const f=ev.form||{};
  const formatDate=d=>d?new Date(d).toLocaleDateString("uk-UA"):"—";
  const yn=v=>v?"Так":"Ні";
  const sections=[];
  if(blocks.includes("main")){
    sections.push(`<h2>Основна інформація</h2>
    <table><tr><td>Назва</td><td><b>${f.eventName||"—"}</b></td></tr>
    <tr><td>Тип</td><td>${f.eventType==="Інше"?f.eventTypeCustom||"—":f.eventType||"—"}</td></tr>
    <tr><td>Формат</td><td>${f.eventFormat||"—"}</td></tr>
    <tr><td>Дата початку</td><td>${formatDate(f.eventDate)}</td></tr>
    <tr><td>Дата закінчення</td><td>${formatDate(f.eventDateEnd)}</td></tr>
    <tr><td>Місто</td><td>${f.city||"—"}</td></tr>
    <tr><td>Клас локації</td><td>${f.venueType||"—"}</td></tr><tr><td>Побажання щодо локації</td><td>${f.venueCustom||"—"}</td></tr>
    <tr><td>Донор</td><td>${(f.donors&&f.donors.filter(d=>d!=="Без донора").join(", "))||"—"}</td></tr>
    <tr><td>Тип доступу</td><td>${f.eventAccess||"—"}</td></tr>
    <tr><td>Тривалість</td><td>${f.duration||"—"}${f.durationHours?" ("+f.durationHours+" год)":""}</td></tr>
    <tr><td>Початок реєстрації</td><td>${f.regStart||"—"}</td></tr>
    <tr><td>Початок заходу</td><td>${f.timeStart||"—"}</td></tr>
    <tr><td>Кінець заходу</td><td>${f.timeEnd||"—"}</td></tr>
    ${(f.anthem||f.minuteSilence)?`<tr><td>Протокол</td><td>${[f.anthem&&"Гімн України",f.minuteSilence&&"Хвилина мовчання"].filter(Boolean).join(", ")}</td></tr>`:""}</table>`);
  }
  if(blocks.includes("team")){
    sections.push(`<h2>Відповідальні</h2>
    <table><tr><td>Керівник проєкту</td><td>${f.head||"—"}</td></tr>
    <tr><td>Експерт ЦППР</td><td>${f.expertName||"—"}</td></tr>
    <tr><td>Координатор</td><td>${f.coordinator||"—"}</td></tr>
    <tr><td>Комунікаційний менеджер</td><td>${f.commManager||"—"}</td></tr>
    <tr><td>Асистент</td><td>${f.assistant||"—"}</td></tr></table>`);
  }
  if(blocks.includes("participants")){
    sections.push(`<h2>Учасники</h2>
    <table><tr><td>Кількість</td><td>${f.participants||"—"}</td></tr>
    <tr><td>Тип розсадки</td><td>${(f.seatingItems||[]).join(", ")||f.seating||"—"}</td></tr>
    <tr><td>Склад аудиторії</td><td>${(f.audienceItems||[]).join(", ")||"—"}${f.audienceOther?", "+f.audienceOther:""}</td></tr>
    ${docType!=="donor"?`<tr><td>Учасники з регіонів</td><td>${f.regionParticipants||"—"}</td></tr>`:""}
    <tr><td>Потреба у проживанні</td><td>${f.accommodation||0} ос.</td></tr>
    <tr><td>Відшкодування проїзду</td><td>${f.travel||0} ос.</td></tr></table>`);
  }
  if(blocks.includes("tech")){
    const techItems=[f.needHall&&"Оренда залу",f.micGoose&&"Мікрофони-гусаки",f.micRadio&&"Радіомікрофони",f.projector&&"Проектор і екран",f.laptop&&"Ноутбук",f.flipchart&&`Фліпчарт${f.flipchartCount>1?` (${f.flipchartCount} шт)`:""}`,(f.streamYoutubeUkr||f.streamYoutubeEng||f.streamFB||f.streamCrosspost)&&`Трансляція (${[f.streamYoutubeUkr&&"YouTube укр",f.streamYoutubeEng&&"YouTube eng",f.streamFB&&"Facebook",f.streamCrosspost&&"Кроспостинг"].filter(Boolean).join(", ")})`,f.onlineZoom&&"Zoom",f.onlineTeams&&"Teams",f.onlineMeets&&"Google Meet",f.translation&&"Синхронний переклад",f.photographer&&`Фотограф${f.photographerHours?` (${f.photographerHours} год)`:""}`,f.videographer&&"Відеооператор",f.recording&&"Запис"].filter(Boolean);
    sections.push(`<h2>Технічне забезпечення</h2><ul>${techItems.map(i=>`<li>${i}</li>`).join("")||"<li>—</li>"}</ul>`);
  }
  if(blocks.includes("catering")){
    const cats=[];
    const cfl=t=>t==="light"?"легка":t==="ext"?"розширена":t==="buffet"?"фуршет":"стандарт";
    if(f.breakfast)cats.push("Сніданок");
    if(f.coffeeWelcome)cats.push(`Вітальна кава (${cfl(f.coffeeWelcomeType)})`);
    if(f.coffeeBreak)cats.push(`Кава-пауза ×${f.coffeeBreakCount||1} (${cfl(f.coffeeBreakType)})`);
    if(f.water)cats.push("Вода на стіл");
    if(f.lunch)cats.push("Обід");
    if(f.coffeeFinal)cats.push(`Фінальна кава (${cfl(f.coffeeFinalType)})${f.coffeeFinalWine?" + вино":""}`);
    if(f.dinner)cats.push("Вечеря");
    sections.push(`<h2>Харчування</h2><ul>${cats.map(i=>`<li>${i}</li>`).join("")||"<li>—</li>"}</ul>`);
  }
  if(blocks.includes("print")){
    const items=[f.badges&&"Бейджі",f.printedPrograms&&"Друковані програми",f.folders&&"Папки учасника",f.notebooks&&"Блокноти і ручки",f.nameplates&&"Таблички на стіл",f.banner&&"Банер"].filter(Boolean);
    sections.push(`<h2>Поліграфія</h2><ul>${items.map(i=>`<li>${i}</li>`).join("")||"<li>—</li>"}</ul>`);
  }
  if(blocks.includes("security")){
    const sec=[f.secShelter&&"Наявність укриття на локації",f.secUDO&&"Координація з УДО",f.secAccreditation&&"Акредитація учасників на вході",f.secGenerator&&"Резервне живлення (генератор)",f.secInternational&&"Інструктаж для міжнародних учасників",f.secNoPhoto&&"Заборона фото/відео"].filter(Boolean);
    sections.push(`<h2>🔒 Безпека</h2><ul>${sec.map(i=>`<li>${i}</li>`).join("")||"<li>Особливих вимог не зазначено</li>"}</ul>${f.secNotes?`<p>${f.secNotes}</p>`:""}`);
  }
  if(blocks.includes("protocol")){
    const proto=[f.anthem&&"Гімн України перед заходом",f.minuteSilence&&"Хвилина мовчання"].filter(Boolean);
    sections.push(`<h2>🎗 Протокол / церемонія</h2><ul>${proto.map(i=>`<li>${i}</li>`).join("")||"<li>Не передбачено</li>"}</ul>`);
  }
  if(blocks.includes("donor")){
    sections.push(`<h2>Комунікації та донор</h2>
    <table><tr><td>Залучення ЗМІ</td><td>${yn(f.media)}</td></tr>
    <tr><td>Анонс на сайті ЦППР</td><td>${yn(f.websiteAnnounce)}</td></tr>
    <tr><td>Донор залучений до організації</td><td>${yn(f.donorInvolved)}</td></tr>
    <tr><td>Донор фінансує частину</td><td>${yn(f.donorFunds)}</td></tr>
    <tr><td>Погодження програми з донором</td><td>${yn(f.donorApproval)}</td></tr>
    <tr><td>Погодження новин/постів</td><td>${yn(f.donorNewsApproval)}</td></tr>
    <tr><td>Надіслати звіт донору</td><td>${yn(f.donorReport)}</td></tr></table>`);
  }
  if(blocks.includes("budget")){
    sections.push(`<h2>Орієнтовний бюджет</h2>
    <table><tr><th>Стаття витрат</th><th>Сума, грн</th></tr>
    ${budget.lines.map(l=>`<tr><td>${l.label}</td><td>${l.amount.toLocaleString("uk-UA")}</td></tr>`).join("")}
    <tr class="total"><td><b>Разом</b></td><td><b>${budget.total.toLocaleString("uk-UA")}</b></td></tr></table>`);
  }
  if(blocks.includes("checklist")&&ev.checklist?.length){
    const groups=[...new Set(ev.checklist.map(t=>t.g))];
    const fmtDl=d=>{if(!d)return"—";const s=d.slice(0,10).split("-");return s[2]+"."+s[1]+"."+s[0];};
    const today=new Date();today.setHours(0,0,0,0);
    const parseDl=d=>{if(!d)return null;return new Date(d.slice(0,10)+"T00:00:00");};
    // Бейдж важливості (blocksCount — скільки задач блокує)
    const impBadge=(n,done)=>{
      if(!n||n===0)return"";
      const [bg,c,lbl]=n>=10?["#FEE2E2","#B91C1C","Критична"]:n>=4?["#FEF3C7","#D97706","Висока"]:["#EBF4FF","#1C75BC","Середня"];
      return`<span style="background:${bg};color:${c};font-size:10px;font-weight:700;padding:1px 7px;border-radius:10px;white-space:nowrap;opacity:${done?0.5:1}">${lbl} 🔗${n}</span>`;
    };
    const clRows=groups.map(g=>{
      const tasks=ev.checklist.filter(t=>t.g===g&&!t.manualDelete);
      if(!tasks.length)return"";
      const rows=tasks.map(t=>{
        const dl=parseDl(t.dlDate||t.dl);
        const isOverdue=!t.done&&dl&&dl<today;
        const isLate=t.done&&t.doneAt&&t.dlDate&&t.doneAt.slice(0,10)>t.dlDate.slice(0,10);
        const rowBg=t.done?"#F9FAFB":isOverdue?"#FEF2F2":"#fff";
        const statusCell=t.done
          ?(isLate?`<span style="color:#D97706;font-weight:600">✓ запізн.</span>`:`<span style="color:#00916E;font-weight:600">✓ вчасно</span>`)
          :(isOverdue?`<span style="color:#DC2626;font-weight:600">⚠ прострочено</span>`:`<span style="color:#6B7A90">очікує</span>`);
        const blk=t.blocksCount||0;
        return`<tr style="background:${rowBg}">
          <td style="padding:5px 8px;border:1px solid #E5E7EB;font-size:11px;color:${t.done?"#9CA3AF":"#1A2535"};text-decoration:${t.done?"line-through":"none"}">${t.t}</td>
          <td style="padding:5px 8px;border:1px solid #E5E7EB;font-size:11px;color:#374151;white-space:nowrap">${t.who||"—"}</td>
          <td style="padding:5px 8px;border:1px solid #E5E7EB;font-size:11px;color:${isOverdue?"#DC2626":"#374151"};white-space:nowrap;font-weight:${isOverdue?700:400}">${fmtDl(t.dlDate||t.dl)}</td>
          <td style="padding:5px 8px;border:1px solid #E5E7EB;font-size:11px;text-align:center">${statusCell}</td>
          <td style="padding:5px 8px;border:1px solid #E5E7EB;font-size:11px;text-align:center">${blk>0?impBadge(blk,t.done):"<span style='color:#D1D5DB;font-size:10px'>—</span>"}</td>
        </tr>`;
      }).join("");
      const doneN=tasks.filter(t=>t.done).length;
      return`<h3 style="font-size:11px;color:#6B7A90;margin:16px 0 5px;text-transform:uppercase;letter-spacing:.06em">${g} <span style="font-weight:400;text-transform:none;letter-spacing:0">(${doneN}/${tasks.length})</span></h3>
      <table style="width:100%;border-collapse:collapse;margin-bottom:4px">
        <thead><tr style="background:#F0F4F8">
          <th style="padding:5px 8px;border:1px solid #E5E7EB;font-size:11px;text-align:left;font-weight:600">Задача</th>
          <th style="padding:5px 8px;border:1px solid #E5E7EB;font-size:11px;font-weight:600;white-space:nowrap">Виконавець</th>
          <th style="padding:5px 8px;border:1px solid #E5E7EB;font-size:11px;font-weight:600;white-space:nowrap">Дедлайн</th>

      <div style="width:${pctDoc}%;height:100%;border-radius:6px;background:${barC}"></div>
    </div>`;
    sections.push(`<h2>Чеклист задач</h2>${summary}${clRows}${legend}`);

// ══ MAIN APP ════════════════════════════════════════════
// Безпечний парсинг дати — підтримує і ISO і YYYY-MM-DD
function parseDlDate(dlDate){
  if(!dlDate)return null;
  if(dlDate.length===10){const[y,m,d]=dlDate.split("-").map(Number);const dt=new Date(y,m-1,d);dt.setHours(0,0,0,0);return dt;}
  const dt=new Date(dlDate);dt.setHours(0,0,0,0);return dt;
}

function GanttChart({ev}){
  const cl=(ev.checklist||[]).filter(t=>!t.manualDelete);
  const f=ev.form||{};
  const [hover,setHover]=React.useState(null);
  const [filterWho,setFilterWho]=React.useState("");
  const [hideAfter,setHideAfter]=React.useState(true);
  const [colorMode,setColorMode]=React.useState("importance"); // importance | who

  const today=new Date();today.setHours(0,0,0,0);

  // Палітра кольорів по виконавцях
  const palette=["#378ADD","#1D9E75","#D85A30","#7F77DD","#D4537E","#BA7517","#639922","#5F5E5A","#A32D2D"];
  const whoList=[...new Set(cl.map(t=>t.who).filter(Boolean))];
  const whoColor={};whoList.forEach((w,i)=>{whoColor[w]=palette[i%palette.length];});

  // Будуємо зворотній граф залежностей (хто від кого залежить) — для підсвічування ланцюга
  const blockedByMap={}; // задача -> [задачі що від неї прямо залежать]
  cl.forEach(t=>{(t.deps||[]).forEach(dep=>{if(!blockedByMap[dep])blockedByMap[dep]=[];blockedByMap[dep].push(t.t);});});
  // Транзитивний список усіх заблокованих
  const allBlockedBy=name=>{const seen=new Set();const q=[name];while(q.length){const c=q.shift();(blockedByMap[c]||[]).forEach(b=>{if(!seen.has(b)){seen.add(b);q.push(b);}});}return seen;};

  // Готуємо задачі з датами
  let tasks=cl.map((t,idx)=>{
    const dl=parseDlDate(t.dlDate);
    const isLate=t.done&&t.doneAt&&t.dlDate&&t.doneAt.slice(0,10)>t.dlDate.slice(0,10);
    const isOvd=!t.done&&dl&&dl<today;
    const blockers=!t.done&&t.deps?.length?t.deps.filter(dn=>cl.some(x=>x.t===dn&&!x.done&&!x.manualDelete)):[];
    const isBlocked=blockers.length>0&&!isOvd;
    return{...t,idx,dl,isLate,isOvd,isBlocked,d:t.d!=null?t.d:99,blocksCount:t.blocksCount||0};
  }).filter(t=>t.dl);

  // Фільтри
  if(filterWho)tasks=tasks.filter(t=>t.who===filterWho);
  if(hideAfter)tasks=tasks.filter(t=>t.d>=0);

  // Сортуємо за дедлайном (від найранішого)
  tasks.sort((a,b)=>(a.dl?.getTime()||0)-(b.dl?.getTime()||0));

  if(!tasks.length)return<div style={{padding:20,textAlign:"center",color:"var(--text2)"}}>Немає задач з дедлайнами для відображення.</div>;

  // Часова шкала
  const allDates=tasks.map(t=>t.dl.getTime());
  const minD=Math.min(...allDates),maxD=Math.max(...allDates);
  const evDate=f.eventDate?parseDlDate(f.eventDate.slice(0,10)):null;
  const spanEnd=evDate?Math.max(maxD,evDate.getTime()):maxD;
  const totalDays=Math.max(1,Math.round((spanEnd-minD)/(1000*60*60*24)));

  // Геометрія
  const rowH=28,labelW=240,chartW=440,padTop=44,padBottom=20;
  const svgW=labelW+chartW+20;
  const svgH=padTop+tasks.length*rowH+padBottom;
  const xFor=ms=>labelW+((ms-minD)/(1000*60*60*24)/totalDays)*chartW;
  const taskY={};tasks.forEach((t,i)=>{taskY[t.t]=padTop+i*rowH+rowH/2;});

  // Розмір маркера за важливістю
  const sizeFor=n=>n>=10?22:n>=4?17:n>=1?13:9;
  // Колір за важливістю
  const impColor=n=>n>=10?"#A32D2D":n>=4?"#BA7517":n>=1?"#378ADD":"#B4B2A9";

  // Підсвічений ланцюг (при hover на задачу — всі що від неї залежать)
  const chain=hover?allBlockedBy(hover.t):new Set();

  // Вертикальні лінії-орієнтири
  const gridLines=[];
  for(let dd=0;dd<=totalDays;dd+=7){
    const x=labelW+(dd/totalDays)*chartW;
    const dt=new Date(minD+dd*86400000);
    gridLines.push({x,label:dt.toLocaleDateString("uk-UA",{day:"2-digit",month:"2-digit"})});
  }
  const evX=evDate?xFor(evDate.getTime()):null;
  const todayX=(today.getTime()>=minD&&today.getTime()<=spanEnd)?xFor(today.getTime()):null;

  // Лінії залежностей
  const depLines=[];
  tasks.forEach(t=>{
    if(t.deps?.length){
      t.deps.forEach(dn=>{
        const src=tasks.find(x=>x.t===dn);
        if(src&&taskY[dn]!=null&&taskY[t.t]!=null){
          // лінія активна якщо в підсвіченому ланцюзі hover-задачі
          const inChain=hover&&(hover.t===dn||hover.t===t.t||(chain.has(t.t)&&(chain.has(dn)||hover.t===dn)));
          depLines.push({x1:xFor(src.dl.getTime())+8,y1:taskY[dn],x2:xFor(t.dl.getTime())-4,y2:taskY[t.t],active:t.isBlocked,inChain});
        }
      });
    }
  });

  const barColor=t=>{
    if(t.done)return"#B4B2A9";
    if(colorMode==="who")return whoColor[t.who]||"#888780";
    return impColor(t.blocksCount);
  };
  const strokeFor=t=>t.isOvd?"#E24B4A":t.isBlocked?"#BA7517":"none";

  const printGantt=()=>{
    const w=window.open("","_blank");
    const svgEl=document.getElementById("gantt-svg");
    w.document.write(`<html><head><title>Діаграма Ганта — ${f.eventName||"захід"}</title>
      <style>
        @page{size:A4 landscape;margin:12mm}
        body{font-family:Arial,sans-serif;padding:20px;margin:0}
        h1{font-size:16px;color:#1C75BC;margin:0 0 6px}
        .meta{font-size:11px;color:#666;margin-bottom:14px}
        svg{width:100%;height:auto;display:block}
        @media print{button{display:none}body{padding:0}}
      </style></head>
      <body><h1>📊 Діаграма Ганта — ${f.eventName||"Захід"}</h1>
      <div class="meta">Дата заходу: ${f.eventDate?parseDlDate(f.eventDate.slice(0,10)).toLocaleDateString("uk-UA"):"—"} · Сформовано: ${new Date().toLocaleDateString("uk-UA")}<br>Розмір маркера = важливість (скільки задач залежить). Число всередині — кількість залежних.</div>
      <button onclick="window.print()" style="margin-bottom:16px;padding:8px 16px;background:#1C75BC;color:#fff;border:none;border-radius:6px;cursor:pointer">🖨 Друк / PDF</button>
      ${svgEl.outerHTML}</body></html>`);
    w.document.close();
  };

  return<div>
    <div style={{display:"flex",gap:8,flexWrap:"wrap",alignItems:"center",marginBottom:12}}>
      <select value={filterWho}onChange={e=>setFilterWho(e.target.value)}style={{padding:"5px 8px",borderRadius:6,border:"1px solid var(--border)",fontSize:12,fontFamily:"var(--font)"}}>
        <option value="">Всі виконавці</option>
        {whoList.map(w=><option key={w}value={w}>{w}</option>)}
      </select>
      <div style={{display:"flex",gap:0,border:"1px solid var(--border)",borderRadius:6,overflow:"hidden"}}>
        <button onClick={()=>setColorMode("importance")}style={{fontSize:11,padding:"5px 10px",border:"none",cursor:"pointer",background:colorMode==="importance"?"#1C75BC":"#fff",color:colorMode==="importance"?"#fff":"var(--text2)",fontFamily:"var(--font)"}}>За важливістю</button>
        <button onClick={()=>setColorMode("who")}style={{fontSize:11,padding:"5px 10px",border:"none",cursor:"pointer",background:colorMode==="who"?"#1C75BC":"#fff",color:colorMode==="who"?"#fff":"var(--text2)",fontFamily:"var(--font)"}}>За виконавцем</button>
      </div>
      <label style={{fontSize:12,display:"flex",alignItems:"center",gap:5,cursor:"pointer"}}>
        <input type="checkbox"checked={hideAfter}onChange={e=>setHideAfter(e.target.checked)}/>
        Сховати задачі після заходу
      </label>
      <button className="btn-ghost"style={{fontSize:12,padding:"5px 12px",marginLeft:"auto"}}onClick={printGantt}>🖨 Друк / PDF</button>
    </div>

    {/* Легенда */}
    <div style={{display:"flex",gap:12,flexWrap:"wrap",fontSize:11,color:"var(--text2)",marginBottom:6,alignItems:"center"}}>
      <span style={{fontWeight:600,color:"var(--text)"}}>Розмір = важливість:</span>
      <span style={{display:"flex",alignItems:"center",gap:5}}><span style={{width:20,height:20,borderRadius:4,background:colorMode==="importance"?"#A32D2D":"#888",display:"inline-block"}}></span>🔗10+ критична</span>
      <span style={{display:"flex",alignItems:"center",gap:5}}><span style={{width:16,height:16,borderRadius:4,background:colorMode==="importance"?"#BA7517":"#888",display:"inline-block"}}></span>🔗4-9 висока</span>
      <span style={{display:"flex",alignItems:"center",gap:5}}><span style={{width:12,height:12,borderRadius:3,background:colorMode==="importance"?"#378ADD":"#888",display:"inline-block"}}></span>🔗1-3 середня</span>
      <span style={{display:"flex",alignItems:"center",gap:5}}><span style={{width:9,height:9,borderRadius:2,background:"#B4B2A9",display:"inline-block"}}></span>не блокує</span>
    </div>
    <div style={{display:"flex",gap:12,flexWrap:"wrap",fontSize:11,color:"var(--text2)",marginBottom:10}}>
      <span style={{display:"flex",alignItems:"center",gap:5}}><span style={{width:11,height:11,borderRadius:3,border:"2px solid #E24B4A",display:"inline-block"}}></span>прострочено</span>
      <span style={{display:"flex",alignItems:"center",gap:5}}><span style={{width:11,height:11,borderRadius:3,border:"2px solid #BA7517",display:"inline-block"}}></span>заблоковано</span>
      {colorMode==="who"&&whoList.filter(w=>!filterWho||w===filterWho).map(w=>
        <span key={w}style={{display:"flex",alignItems:"center",gap:5}}><span style={{width:11,height:11,borderRadius:3,background:whoColor[w],display:"inline-block"}}></span>{w}</span>
      )}
    </div>

    <div style={{overflowX:"auto",border:"1px solid var(--border)",borderRadius:8,background:"#fff",position:"relative"}}>
      <svg id="gantt-svg"viewBox={`0 0 ${svgW} ${svgH}`}width={svgW}style={{minWidth:svgW,display:"block"}}>
        {gridLines.map((g,i)=><g key={i}>
          <line x1={g.x}y1={padTop-8}x2={g.x}y2={svgH-padBottom}stroke="#EEE"strokeWidth="1"/>
          <text x={g.x}y={padTop-14}fontSize="9"fill="#AAA"textAnchor="middle">{g.label}</text>
        </g>)}
        {todayX!=null&&<g>
          <line x1={todayX}y1={padTop-8}x2={todayX}y2={svgH-padBottom}stroke="#1C75BC"strokeWidth="1.5"strokeDasharray="3,2"/>
          <text x={todayX}y={padTop-26}fontSize="9"fill="#1C75BC"textAnchor="middle"fontWeight="700">сьогодні</text>
        </g>}
        {evX!=null&&<g>
          <line x1={evX}y1={padTop-8}x2={evX}y2={svgH-padBottom}stroke="#A32D2D"strokeWidth="1.5"/>
          <text x={evX}y={padTop-26}fontSize="9"fill="#A32D2D"textAnchor="middle"fontWeight="700">захід</text>
        </g>}
        {/* Лінії залежностей */}
        {depLines.map((l,i)=>{
          const hl=l.inChain;
          return<path key={i}d={`M${l.x1},${l.y1} C${l.x1+20},${l.y1} ${l.x2-20},${l.y2} ${l.x2},${l.y2}`}
            fill="none"stroke={hl?"#A32D2D":l.active?"#BA7517":"#E0E0E0"}
            strokeWidth={hl?1.8:l.active?1.3:0.7}
            strokeDasharray={hl?"none":l.active?"none":"2,2"}
            opacity={hover&&!hl?0.25:1}/>;
        })}
        {/* Задачі */}
        {tasks.map((t,i)=>{
          const y=padTop+i*rowH;
          const cx=xFor(t.dl.getTime());
          const sz=sizeFor(t.blocksCount);
          const inChain=hover&&chain.has(t.t);
          const isHovered=hover&&hover.t===t.t;
          const dimmed=hover&&!inChain&&!isHovered;
          return<g key={i}onMouseEnter={()=>setHover(t)}onMouseLeave={()=>setHover(null)}style={{cursor:"pointer"}}opacity={dimmed?0.35:1}>
            <rect x="0"y={y}width={svgW}height={rowH}fill={isHovered?"#FFF7E6":inChain?"#FEF2F2":i%2?"#FAFBFC":"#fff"}/>
            <text x="8"y={y+rowH/2+3}fontSize="10.5"fill={inChain?"#A32D2D":t.isOvd?"#A32D2D":t.isBlocked?"#854F0B":t.done?"#999":"#1A2535"}
              fontWeight={isHovered||inChain?"600":"400"}
              style={{textDecoration:t.done?"line-through":"none"}}>
              {(t.isOvd?"⚠ ":t.isBlocked?"🔒 ":t.done?"✓ ":"")+(t.t.length>30?t.t.slice(0,29)+"…":t.t)}
            </text>
            {/* Маркер задачі — розмір за важливістю */}
            <rect x={cx-sz/2}y={y+rowH/2-sz/2}width={sz}height={sz}rx={sz>=17?4:3}
              fill={barColor(t)}stroke={strokeFor(t)}strokeWidth={strokeFor(t)!=="none"?2:0}
              strokeDasharray={t.isBlocked&&!t.isOvd?"3,2":"none"}/>
            {t.blocksCount>=4&&!t.done&&<text x={cx}y={y+rowH/2+3}fontSize={sz>=22?9:8}fill="#fff"textAnchor="middle"fontWeight="700">{t.blocksCount}</text>}
            {t.done&&<text x={cx}y={y+rowH/2+3}fontSize="9"fill="#fff"textAnchor="middle">✓</text>}
          </g>;
        })}
      </svg>

      {hover&&<div style={{position:"absolute",top:8,right:8,background:"#252868",color:"#fff",padding:"8px 12px",borderRadius:8,fontSize:11,maxWidth:300,boxShadow:"0 4px 12px rgba(0,0,0,0.3)",pointerEvents:"none",zIndex:10}}>
        <div style={{fontWeight:700,marginBottom:3}}>{hover.t}</div>
        <div style={{opacity:.85}}>👤 {hover.who||"—"}</div>
        <div style={{opacity:.85}}>📅 Дедлайн: {hover.dl.toLocaleDateString("uk-UA")}</div>
        {hover.done&&<div style={{color:"#7DE0B8"}}>✓ Виконано{hover.isLate?" (із запізненням)":""}</div>}
        {hover.isOvd&&<div style={{color:"#FCA5A5"}}>⚠ Прострочено</div>}
        {hover.isBlocked&&<div style={{color:"#FCD34D",marginTop:3}}>🔒 Чекає на: {cl.filter(x=>hover.deps?.includes(x.t)&&!x.done).map(x=>x.t).join(", ")}</div>}
        {(hover.blocksCount||0)>0&&<div style={{color:"#FFD27D",marginTop:3,fontWeight:700}}>🔗 Блокує {hover.blocksCount} задач{chain.size>0?` — підсвічено червоним`:""}</div>}
        {(hover.blocksCount||0)===0&&<div style={{opacity:.7,marginTop:3}}>Не блокує інших задач</div>}
      </div>}
    </div>

    <div style={{fontSize:11,color:"var(--text3)",marginTop:8}}>
      Наведіть на задачу — <b style={{color:"#A32D2D"}}>червоним</b> підсвітяться всі задачі що від неї залежать (прямо і через ланцюг). Розмір маркера = кількість залежних задач.
    </div>
  </div>;
}

function SendEmailsModal({ev, team, config, onClose}){
  const f = ev.form || {};

  // Рахуємо виконавців один раз — стабільна функція без useMemo щоб уникнути циклів
  const buildAssignees = ()=>{
    const cl = ev.checklist?.filter(t=>!t.manualDelete) || [];
    const map = {};
    cl.forEach(t=>{
      const w = t.who;
      if(!w) return;
      if(!map[w]) map[w] = {name:w, total:0, done:0, email:null};
      map[w].total++;
      if(t.done) map[w].done++;
    });
    const norm = s => s?.trim().toLowerCase().replace(/\s+/g," ");
    const flip = s => { const p = s.split(" "); return p.length===2 ? p[1]+" "+p[0] : s; };
    (team||DEFAULT_TEAM).forEach(m=>{
      const mNorm = norm(m.name);
      const mFlip = flip(mNorm);
      Object.keys(map).forEach(who=>{
        const wNorm = norm(who);
        if(wNorm === mNorm || wNorm === mFlip) map[who].email = m.email;
      });
    });
    return Object.values(map).sort((a,b)=>b.total-a.total);
  };

  // Розраховуємо один раз при монтуванні — ref щоб не змінювався
  const assigneesRef = React.useRef(null);
  if(!assigneesRef.current) assigneesRef.current = buildAssignees();
  const assignees = assigneesRef.current;

  const cl = ev.checklist?.filter(t=>!t.manualDelete) || [];

  // selected — масив email, ініціалізується одразу з правильними значеннями
  const [selected, setSelected] = React.useState(
    ()=> assignees.filter(a=>a.email).map(a=>a.email)
  );
  const [customEmail, setCustomEmail] = React.useState("");
  const [customList, setCustomList] = React.useState([]);
  const [isSending, setIsSending] = React.useState(false);
  const [sent, setSent] = React.useState(null);

  const toggleAssignee = email => setSelected(prev=>
    prev.includes(email) ? prev.filter(e=>e!==email) : [...prev, email]
  );

  const addCustom = ()=>{
    const emails = customEmail.split(/[,;\s]+/).map(e=>e.trim()).filter(e=>e.includes("@"));
    if(!emails.length) return;
    setCustomList(prev=>[...new Set([...prev, ...emails])]);
    setCustomEmail("");
  };

  const removeCustom = email => setCustomList(prev=>prev.filter(e=>e!==email));

  const allRecipients = [...selected, ...customList.filter(e=>!selected.includes(e))];

  const doSend = async()=>{
    if(!allRecipients.length){ showToast("Оберіть хоча б одного отримувача"); return; }
    if(!config.sheetsApiUrl){ showToast("Немає підключення"); return; }
    setIsSending(true);
    try{
      // Зберігаємо чеклист
      const clData = cl.map(t=>({g:t.g,t:t.t,who:t.who,dl:t.dl,d:t.d,done:t.done||false,doneAt:t.doneAt,dlDate:t.dlDate,deps:t.deps,blocksCount:t.blocksCount,manualWho:t.manualWho,manualDate:t.manualDate,manualDelete:t.manualDelete}));
      const chunkSize=10;
      for(let i=0;i<clData.length;i+=chunkSize){
        await sheetsPost(config.sheetsApiUrl,"saveClChunk",{id:ev.id,offset:i,cl:clData.slice(i,i+chunkSize),total:clData.length});
      }
      // Передаємо список отримувачів в скрипт
      const res = await sheetsPost(config.sheetsApiUrl,"sendEmails",{evId:ev.id,recipients:allRecipients});
      if(res?.ok){ setSent(res.sent||allRecipients.length); }
      else showToast("Помилка: "+(res?.error||"невідома"));
    }catch(e){ showToast("Помилка надсилання"); }
    setIsSending(false);
  };

  if(sent!==null) return <div className="modal-overlay" onClick={onClose} style={{background:"rgba(15,23,42,0.82)",backdropFilter:"blur(3px)"}}>
    <div onClick={e=>e.stopPropagation()} style={{maxWidth:420,width:"100%",borderRadius:16,background:"var(--bg-white)",boxShadow:"0 20px 60px rgba(0,0,0,0.4)",padding:"32px 28px",textAlign:"center"}}>
      <div style={{fontSize:40,marginBottom:12}}>✅</div>
      <div style={{fontSize:16,fontWeight:700,color:"var(--dark)",marginBottom:6}}>Надіслано!</div>
      <div style={{fontSize:13,color:"var(--text2)",marginBottom:20}}>Листи з задачами отримали <b>{sent}</b> виконавців</div>
      <button className="btn-primary" onClick={onClose}>Закрити</button>
    </div>
  </div>;

  return <div className="modal-overlay" onClick={onClose} style={{background:"rgba(15,23,42,0.82)",backdropFilter:"blur(3px)"}}>
    <div onClick={e=>e.stopPropagation()} style={{
      maxWidth:520, width:"100%", borderRadius:16, overflow:"hidden",
      boxShadow:"0 20px 60px rgba(0,0,0,0.45)", background:"var(--bg-white)",
      maxHeight:"90vh", display:"flex", flexDirection:"column"
    }}>

      {/* Шапка */}
      <div style={{background:"linear-gradient(135deg,#1C75BC 0%,#252868 100%)",padding:"18px 20px 14px",flexShrink:0}}>
        <div style={{display:"flex",alignItems:"flex-start",justifyContent:"space-between",gap:12}}>
          <div>
            <div style={{fontSize:11,color:"rgba(255,255,255,0.7)",marginBottom:6,letterSpacing:".04em"}}>НАДІСЛАТИ ЗАДАЧІ</div>
            <div style={{fontSize:14,fontWeight:600,color:"#fff",lineHeight:1.3}}>{f.eventName||"Захід"}</div>
            {f.eventDate&&<div style={{fontSize:11,color:"rgba(255,255,255,0.6)",marginTop:3}}>
              {new Date(f.eventDate+"T00:00:00").toLocaleDateString("uk-UA")}{f.city?" · "+f.city:""}
            </div>}
          </div>
          <button onClick={onClose} style={{background:"rgba(255,255,255,0.12)",border:"none",borderRadius:8,width:32,height:32,cursor:"pointer",color:"rgba(255,255,255,0.8)",fontSize:16,display:"flex",alignItems:"center",justifyContent:"center",flexShrink:0}}>✕</button>
        </div>
      </div>

      {/* Тіло */}
      <div style={{padding:"16px 20px 20px",overflowY:"auto",flex:1}}>

        {/* Виконавці з чеклиста */}
        <div style={{fontSize:12,fontWeight:600,color:"var(--dark)",marginBottom:6}}>
          Виконавці із чеклиста
          <span style={{fontWeight:400,color:"var(--text2)",marginLeft:6,fontSize:11}}>({selected.length} обрано)</span>
          <button onClick={()=>setSelected(assignees.filter(a=>a.email).map(a=>a.email))}
            style={{fontSize:10,color:"var(--blue)",background:"none",border:"none",cursor:"pointer",marginLeft:8}}>всі</button>
          <button onClick={()=>setSelected([])}
            style={{fontSize:10,color:"var(--text3)",background:"none",border:"none",cursor:"pointer",marginLeft:2}}>жодного</button>
        </div>

        <div style={{display:"flex",flexDirection:"column",gap:5,marginBottom:16}}>
          {assignees.map(a=>{
            const hasMail = !!a.email;
            const isSel = hasMail && selected.includes(a.email);
            const pct = a.total ? Math.round(a.done/a.total*100) : 0;
            const barC = pct>=80?"#00916E":pct>=50?"#1C75BC":"#DC2626";
            return <div key={a.name}
              onClick={()=>hasMail&&toggleAssignee(a.email)}
              style={{
                display:"flex",alignItems:"center",gap:10,padding:"9px 12px",
                borderRadius:8,border:`1.5px solid ${isSel?"var(--blue)":hasMail?"var(--border)":"#F3F4F6"}`,
                background:isSel?"var(--blue-light)":hasMail?"var(--bg-white)":"var(--bg-card)",
                cursor:hasMail?"pointer":"default",transition:"all .15s"
              }}>
              {/* Чекбокс */}
              <div style={{
                width:16,height:16,borderRadius:4,border:`1.5px solid ${isSel?"var(--blue)":hasMail?"var(--border)":"#D1D5DB"}`,
                background:isSel?"var(--blue)":"transparent",display:"flex",alignItems:"center",justifyContent:"center",flexShrink:0
              }}>
                {isSel&&<span style={{color:"#fff",fontSize:11,lineHeight:1}}>✓</span>}
              </div>
              {/* Ім'я і email */}
              <div style={{flex:1,minWidth:0}}>
                <div style={{fontSize:12,fontWeight:600,color:hasMail?"var(--dark)":"var(--text3)"}}>{a.name}</div>
                {hasMail
                  ? <div style={{fontSize:10,color:"var(--text3)"}}>{a.email}</div>
                  : <div style={{fontSize:10,color:"#EF4444"}}>⚠ немає email у команді</div>}
              </div>
              {/* Задачі + прогрес */}
              <div style={{textAlign:"right",flexShrink:0}}>
                <div style={{fontSize:11,color:isSel?"var(--blue)":"var(--text2)",fontWeight:600}}>
                  {a.done}/{a.total} задач
                </div>
                <div style={{width:60,height:4,background:"#E5E7EB",borderRadius:4,marginTop:3}}>
                  <div style={{width:pct+"%",height:"100%",borderRadius:4,background:barC}}></div>
                </div>
              </div>
            </div>;
          })}
        </div>

        {/* Інші члени команди */}
        {(()=>{
          const assigneeNames = new Set(assignees.map(a=>a.name));
          const norm = s => s?.trim().toLowerCase().replace(/\s+/g," ");
          const others = (team||DEFAULT_TEAM).filter(m=>
            !assignees.some(a=>norm(a.name)===norm(m.name)) && m.email
          );
          if(!others.length) return null;
          return <div style={{marginBottom:16}}>
            <div style={{fontSize:12,fontWeight:600,color:"var(--dark)",marginBottom:6}}>
              Інші члени команди
              <span style={{fontWeight:400,color:"var(--text2)",marginLeft:6,fontSize:11}}>не мають задач у чеклисті — отримають повний список</span>
            </div>

// Мерджить залежності з аркушу "Залежності" в список задач
function mergeTaskDeps(taskList, depsData) {
  if (!depsData || !depsData.deps) return taskList;
  // Будуємо: назва задачі -> масив залежностей
  const depsMap = {};
  (depsData.deps || []).forEach(([task, dep]) => {
    if (!depsMap[task]) depsMap[task] = [];
    depsMap[task].push(dep);
  });
  const indepSet = new Set(depsData.independent || []);
  return taskList.map(t => ({
    ...t,
    deps: depsMap[t.t] || t.deps || [],
    independent: indepSet.has(t.t) || t.independent || false
  }));
}

// Розраховує транзитивний вплив кожної задачі (скільки інших блокує)
function calcBlocksCount(taskList){
  // Будуємо граф: task.t -> задачі що від неї залежать
  const blocks={};
  taskList.forEach(t=>{
    if(!t.deps||t.independent)return;
    t.deps.forEach(depText=>{
      if(!blocks[depText])blocks[depText]=new Set();
      blocks[depText].add(t.t);
    });
  });
  // Транзитивний обхід для кожної задачі
  function countBlocked(taskText){
    const visited=new Set();
    const queue=[taskText];
    while(queue.length){
      const curr=queue.shift();
      (blocks[curr]||new Set()).forEach(b=>{
        if(!visited.has(b)){visited.add(b);queue.push(b);}
      });
    }
    return visited.size;
  }
  const result={};
  taskList.forEach(t=>{ result[t.t]=countBlocked(t.t); });
  return result;
}


// Зворотній граф + транзитивний список заблокованих (для звіту)
function buildBlockedByMapFront(taskList) {
  const map = {};
  taskList.forEach(t => {
    if (!t.deps || t.independent) return;
    t.deps.forEach(dep => {
      if (!map[dep]) map[dep] = [];
      map[dep].push(t.t);
    });
  });
  return map;
}
function getAllBlockedFront(taskName, bbMap) {
  const visited = new Set();
  const queue = [taskName];
  while (queue.length) {
    const curr = queue.shift();
    (bbMap[curr] || []).forEach(b => { if (!visited.has(b)) { visited.add(b); queue.push(b); } });
  }
  return [...visited];
}

// Декодуємо JWT щоб дістати email та ім'я (без перевірки — перевірка на бекенді)
function decodeJwt(token){
  try{
    const payload=token.split(".")[1];
    const json=decodeURIComponent(atob(payload.replace(/-/g,"+").replace(/_/g,"/")).split("").map(c=>"%"+("00"+c.charCodeAt(0).toString(16)).slice(-2)).join(""));
    return JSON.parse(json);
  }catch(e){return null;}
}

  // ── Перевірка доступу при старті ──
  const verifyAccess=async(token,email)=>{
    window.__authToken=token;
    const res=await sheetsRequest(SHEETS_API_URL,"checkAccess",{});
    if(res&&res.allowed){
      setAuthEmail(email);
      setAuthName(res.name||"");
      setAuthState("ok");
      return true;
    }else if(res&&res.denied){
      // Токен валідний, але email НЕ в команді — справжня відмова доступу
      setAuthEmail(email||"");
      setAuthState("denied");
      return false;
    }else{
      // Токен невалідний/протух (denied:false) — треба увійти заново
      localStorage.removeItem("cppr_auth_token");
      localStorage.removeItem("cppr_auth_email");
      window.__authToken=null;
      setAuthState("login");
      return false;
    }
  };
  const handleLogin=(token,info)=>{
    verifyAccess(token,info.email);
  };
  const handleLogout=()=>{
    localStorage.removeItem("cppr_auth_token");
    localStorage.removeItem("cppr_auth_email");
    window.__authToken=null;
    if(window.google?.accounts?.id)window.google.accounts.id.disableAutoSelect();
    setAuthState("login");
    setAuthEmail("");
  };
  useEffect(()=>{
    // Якщо CLIENT_ID не налаштований — пропускаємо автентифікацію (режим розробки)
    if(GOOGLE_CLIENT_ID.startsWith("ВАШ_CLIENT_ID")){setAuthState("ok");return;}
    // Обробник протухання токена під час роботи
    window.__onAuthExpired=()=>{
      localStorage.removeItem("cppr_auth_token");
      window.__authToken=null;
      setAuthState("login");
      showToast("Сесія завершилась — увійдіть знову");
    };
    const savedToken=localStorage.getItem("cppr_auth_token");
    const savedEmail=localStorage.getItem("cppr_auth_email");
    if(savedToken){
      verifyAccess(savedToken,savedEmail);
    }else{
      setAuthState("login");
    }
  },[]);

  useEffect(()=>{
    if(authState!=="ok")return;
    (async()=>{
      setLoading(true);
      if(SHEETS_API_URL){
        // Завантажуємо налаштування з таблиці
        const [sRes, depsRes] = await Promise.all([
          sheetsRequest(SHEETS_API_URL,"getSettings",{}),
          sheetsRequest(SHEETS_API_URL,"getDeps",{})
        ]);
        if(depsRes?.deps){setTaskDeps(depsRes);window.__taskDeps=depsRes;}
        if(sRes===null){
          showToast("⚠️ Не вдалось підключитись до таблиці","error");
        }
        if(sRes?.settings){
          const s=sRes.settings;
          if(s.team&&s.team.length){setTeam(s.team);localStorage.setItem("cppr_team",JSON.stringify(s.team));}
          if(s.costs){setCosts(s.costs);localStorage.setItem("cppr_costs",JSON.stringify(s.costs));}
          if(s.eventTypes){setEventTypesList(s.eventTypes);localStorage.setItem("cppr_event_types",JSON.stringify(s.eventTypes));}
          if(s.accessTypes){setAccessTypesList(s.accessTypes);localStorage.setItem("cppr_access_types",JSON.stringify(s.accessTypes));}
          if(s.donors){setDonorsList(s.donors);localStorage.setItem("cppr_donors",JSON.stringify(s.donors));}
          if(s.notifications){setNotifications(s.notifications);localStorage.setItem("cppr_notifications",JSON.stringify(s.notifications));}
        }
        // Задачі — окремий запит, завжди актуальні
        const tRes=await sheetsRequest(SHEETS_API_URL,"getTasks",{});
        if(tRes?.tasks&&tRes.tasks.length){
          const st=sortTasks(tRes.tasks);
          setTasks(st);
          localStorage.setItem("cppr_tasks",JSON.stringify(st));
        } else if(sRes?.settings?.tasks&&sRes.settings.tasks.length){
          // Fallback — якщо getTasks не спрацював але getSettings повернув задачі
          const st=sortTasks(sRes.settings.tasks);
          setTasks(st);
          localStorage.setItem("cppr_tasks",JSON.stringify(st));
        }
        // Завантажуємо заявки
        const res=await sheetsRequest(SHEETS_API_URL,"getAll",{});
        if(res?.events){setEvs(res.events);setLoading(false);return;}
      }
      try{const s=localStorage.getItem("cppr_events_v3");if(s)setEvs(JSON.parse(s));}catch(e){}
      setLoading(false);
    })();
  },[authState]);

  const saveEvs=async(list,changedId)=>{
    setSaving(true);localStorage.setItem("cppr_events_v3",JSON.stringify(list));
    if(config.sheetsApiUrl&&changedId){
      const ev=list.find(e=>e.id===changedId);
      if(ev){
        // Передаємо без чеклиста щоб не перевищити ліміт GET URL
        const evToSend={...ev,checklist:[]};
        await sheetsRequest(config.sheetsApiUrl,"upsert",{ev:JSON.stringify(evToSend)});
        // Якщо є чеклист — зберігаємо частинами (GET має ліміт ~2кБ)
        if(ev.checklist?.length){
          const chunkSize=15;
          for(let i=0;i<ev.checklist.length;i+=chunkSize){
            await sheetsPost(config.sheetsApiUrl,"saveClChunk",{id:ev.id,offset:i,cl:ev.checklist.slice(i,i+chunkSize),total:ev.checklist.length});
          }
        }
      }
    } else if(config.sheetsApiUrl){
      for(const ev of list){
        const evToSend={...ev,checklist:[]};
        await sheetsRequest(config.sheetsApiUrl,"upsert",{ev:JSON.stringify(evToSend)});
      }
    }
    setSaving(false);
  };

  const getEv=()=>evs.find(e=>e.id===cid)||null;
  const createNew=()=>{
    const id=Date.now().toString();
    const n={id,status:"draft",createdAt:new Date().toISOString(),
      form:{city:"Київ",eventAccess:"Для запрошених",eventFormat:"Офлайн",duration:"Повний день",coffeeItems:[],streamPlatforms:[]},checklist:[]};
    const u=[n,...evs];setEvs(u);saveEvs(u,id);setCid(id);setTab("form");setView("detail");
  };
  const upd=(patch)=>{const u=evs.map(e=>e.id===cid?{...e,...patch}:e);setEvs(u);saveEvs(u,cid);};
  const uf=(field,val)=>{const ev=getEv();upd({form:{...ev.form,[field]:val}});};
  const delEv=(id)=>{if(!confirm("Видалити заявку?"))return;const u=evs.filter(e=>e.id!==id);setEvs(u);sheetsRequest(config.sheetsApiUrl,"delete",{id});localStorage.setItem("cppr_events_v3",JSON.stringify(u));if(cid===id)setView("list");};
  const copyEv=(id,e)=>{

    const copy={...src,id:newId,status:"draft",createdAt:new Date().toISOString(),checklist:[],

  const sendApprovalInfo=(srcEv)=>{
    if(!config.sheetsApiUrl)return;
    if(!confirm("Надіслати інформацію про захід на загальну пошту centre@pravo.org.ua?\n\n(Основна інформація, Відповідальні, Учасники, Безпека)"))return;
    sheetsPost(config.sheetsApiUrl,"sendApprovalInfo",{evId:srcEv.id,form:srcEv.form||{}});
    showToast("📧 Інформацію надіслано на centre@pravo.org.ua");
  };
  const approve=()=>{const ev=getEv();triggerStatusNotification(ev,"approved");sendApprovalInfo(ev);upd({status:"approved",checklist:genChecklist(ev.form,tasks,team),approvedAt:new Date().toISOString()});setTab("checklist");showToast("Затверджено! Чеклист сформовано.");};
  const updateChecklist=()=>{
    const ev=getEv();
    const newCl=genChecklist(ev.form,tasks,team);
    const oldCl=ev.checklist||[];
    // Зберігаємо статус виконання і вручну змінені дати
    const merged=newCl.map(newTask=>{
      const existing=oldCl.find(old=>old.t===newTask.t&&old.g===newTask.g);
      if(!existing)return newTask;
      let base={...newTask,done:existing.done,overdue:existing.overdue};
      // Зберігаємо вручну зміненого виконавця
      if(existing.manualWho)base={...base,who:existing.who,manualWho:true};
      // Зберігаємо вручну змінену дату
      if(existing.manualDate)base={...base,dlDate:existing.dlDate,dl:existing.dl,manualDate:true};
      return base;
    });
    // Задачі видалені вручну (є в oldCl з manualDelete) — не додаємо назад
    const deletedTexts=new Set(oldCl.filter(t=>t.manualDelete).map(t=>t.t+"||"+t.g));
    const finalCl=merged.filter(t=>!deletedTexts.has(t.t+"||"+t.g));
    // Зберігаємо задачі додані вручну (їх немає в шаблоні)
    const manualTasks=oldCl.filter(t=>t.manualAdd&&!t.manualDelete);
    upd({checklist:[...finalCl,...manualTasks]});
    setTab("checklist");
    showToast(`Чеклист оновлено: ${finalCl.length+manualTasks.length} задач`);
  };
  const sendEmails=async()=>{
    const ev=getEv();
    if(!ev.checklist?.length){showToast("Спочатку затвердіть заявку і сформуйте чеклист");return;}
    if(!config.sheetsApiUrl){showToast("Немає підключення до Google Sheets");return;}
    setSending(true);
    showToast("Надсилаємо листи...");
    try{
      // Зберігаємо чеклист частинами по 10 задач
      const cl=ev.checklist.map(t=>({g:t.g,t:t.t,who:t.who,dl:t.dl,done:t.done||false}));
      const chunkSize=10;
      for(let i=0;i<cl.length;i+=chunkSize){
        await sheetsPost(config.sheetsApiUrl,"saveClChunk",{id:ev.id,offset:i,cl:cl.slice(i,i+chunkSize),total:cl.length});
      }
      // Надсилаємо листи — команда читається скриптом з аркушу "Налаштування"
      const res=await sheetsPost(config.sheetsApiUrl,"sendEmails",{evId:ev.id,recipients:[]});
      if(res?.ok)showToast(`✓ Надіслано листів: ${res.sent}`);
      else showToast("Помилка: "+(res?.error||"невідома"));
    }catch(e){showToast("Помилка надсилання");}
    setSending(false);
  };
  const toggleCL=(idx)=>{
    const ev=getEv();const today=new Date();today.setHours(0,0,0,0);
    const todayStr=today.getFullYear()+"-"+String(today.getMonth()+1).padStart(2,"0")+"-"+String(today.getDate()).padStart(2,"0");
    const cl=ev.checklist.map((t,i)=>{
      if(i!==idx)return t;
      const u={...t,done:!t.done};
      if(u.done){if(!u.doneAt)u.doneAt=todayStr;}
      else{u.doneAt=null;}
      if(u.dlDate){const dl=parseDlDate(u.dlDate);u.overdue=!u.done&&dl<today;}
      return u;
    });
    upd({checklist:cl});
  };
  const changeTaskAssignee=(idx,who)=>{
    const ev=getEv();
    const cl=ev.checklist.map((t,i)=>i===idx?{...t,who,manualWho:true}:t);
    upd({checklist:cl});
  };
  const changeDoneAt=(idx,dateStr)=>{
    const ev=getEv();
    const cl=ev.checklist.map((t,i)=>i===idx?{...t,doneAt:dateStr||null}:t);
    upd({checklist:cl});
  };
  const changeTaskDate=(idx,dateStr)=>{
    const ev=getEv();
    const cl=ev.checklist.map((t,i)=>{
      if(i!==idx)return t;
      if(!dateStr)return{...t,dlDate:null,dl:"—",manualDate:false};
      // Зберігаємо як локальну дату без конвертації в UTC
      const [y,m,d]=dateStr.split("-").map(Number);
      const dl=`${String(d).padStart(2,"0")}.${String(m).padStart(2,"0")}.${y}`;
      // dlDate зберігаємо як "YYYY-MM-DD" рядок, не ISO
      return{...t,dlDate:dateStr,dl,manualDate:true};
    });
    upd({checklist:cl});
  };
  const removeTask=(idx)=>{
    if(!confirm("Видалити задачу? При оновленні чеклиста вона не повернеться."))return;
    const ev=getEv();
    const cl=ev.checklist.filter((_,i)=>i!==idx);
    const deleted=ev.checklist[idx];
    if(deleted)cl.push({...deleted,manualDelete:true,done:false,hidden:true});
    upd({checklist:cl});
  };
  const restoreTask=(t)=>{
    const ev=getEv();
    const cl=ev.checklist.map(task=>
      task.t===t.t&&task.g===t.g?{...task,manualDelete:false,hidden:false}:task
    );
    upd({checklist:cl});
    showToast("Задачу відновлено");
  };
  const addManualTask=()=>{
    const ev=getEv();
    const title=prompt("Назва нової задачі:");
    if(!title||!title.trim())return;
    // Визначаємо групу: беремо з останньої задачі або дефолт
    const existingGroups=[...new Set((ev.checklist||[]).filter(t=>!t.manualDelete).map(t=>t.g))];
    const grp=existingGroups.length?existingGroups[existingGroups.length-1]:"Додані вручну";
    const newTask={
      g:grp,t:title.trim(),who:"",dl:"—",dlDate:null,d:0,
      done:false,deps:[],blocksCount:0,manualAdd:true
    };
    upd({checklist:[...(ev.checklist||[]),newTask]});
    showToast("Задачу додано — вкажіть виконавця і дедлайн");
  };

  // ── Підсумки заходу: журнал коментарів + остаточний бюджет ──
  const getSummary=()=>{const ev=getEv();return ev?.summary||{comments:[],finalBudget:[]};};
  const pushSyncSummary=(summary)=>{
    // Дублюємо бюджет у плаский аркуш "Підсумки" для аналітики (асинхронно, не блокує UI)

    });

  const addComment=(text)=>{

  // Ініціалізація таблиці бюджету з кошторису (план→стаття), факт лишаємо порожнім
